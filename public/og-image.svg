<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001a5e"/>
      <stop offset="100%" stop-color="#0a2548"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="30%" r="42%">
      <stop offset="0%" stop-color="#009c3b" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#009c3b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="18%" cy="78%" r="32%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Brand -->
  <g transform="translate(80,76)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">
      Brasil<tspan fill="#FFD700">Connect</tspan>
    </text>
    <text x="0" y="22" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.5)" letter-spacing="3">USA</text>
  </g>

  <!-- Tag -->
  <g transform="translate(80,180)">
    <rect x="0" y="0" width="220" height="34" rx="17" fill="rgba(0,156,59,0.18)" stroke="rgba(0,156,59,0.4)" stroke-width="1"/>
    <text x="20" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#5FE89A" letter-spacing="1.5">⚽ BOLÃO COPA 2026</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80,250)">
    <text font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="-2">
      <tspan x="0" y="0">A Copa é</tspan>
      <tspan x="0" y="84" fill="#FFD700" font-style="italic">aqui nos EUA.</tspan>
      <tspan x="0" y="168">Bora montar</tspan>
      <tspan x="0" y="252">nosso <tspan fill="#5FE89A">bolão?</tspan></tspan>
    </text>
  </g>

  <!-- Football emoji (right side) -->
  <g transform="translate(870,180)">
    <circle cx="120" cy="120" r="120" fill="#FFFFFF" stroke="#001a5e" stroke-width="3"/>
    <!-- Soccer ball pattern (simplified pentagons) -->
    <g fill="#1A1F1C">
      <polygon points="120,60 145,82 135,114 105,114 95,82"/>
      <polygon points="60,140 85,118 105,135 95,165 70,165"/>
      <polygon points="180,140 165,118 145,135 155,165 175,160"/>
      <polygon points="120,200 100,180 140,180"/>
    </g>
  </g>

  <!-- Bottom strip -->
  <g transform="translate(80,548)">
    <text font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.85)">
      <tspan x="0" y="0">🇧🇷 Ranking do seu estado</tspan>
      <tspan x="380" y="0">🌎 Ranking nacional EUA</tspan>
      <tspan x="780" y="0">⚡ 100% gratuito</tspan>
    </text>
  </g>

  <!-- Brazil flag stripe at bottom -->
  <rect x="0" y="624" width="1200" height="6" fill="#009c3b"/>
</svg>
