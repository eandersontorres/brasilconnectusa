<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline · BrasilConnect</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    body { margin:0; padding:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:#FAF7F0; color:#1A1F1C; font-family:'Sora', 'Inter', -apple-system, sans-serif; text-align:center; }
    .wrap { max-width:420px; padding:32px; }
    img { height:64px; margin-bottom:24px; }
    h1 { font-family:'Fraunces', Georgia, serif; font-size:1.8rem; margin:0 0 12px; }
    p { color:#6B6E68; line-height:1.6; }
    button { margin-top:20px; padding:12px 28px; background:#1A1F1C; color:#FAF7F0; border:none; border-radius:10px; font-weight:600; cursor:pointer; font-family:inherit; }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/img/logo-mark.svg" alt="BrasilConnect" />
    <h1>Você está offline</h1>
    <p>Não conseguimos conectar agora. Algumas páginas que você visitou recentemente continuam disponíveis. Quando a internet voltar, atualize a página.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
  <script>
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
