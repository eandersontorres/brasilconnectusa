<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Painel do Assinante · BrasilConnect USA</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,200;1,9..144,300&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/premium.css">

  <style>
    /* Container do painel (max 900px) */
    .painel-container {
      max-width: 900px;
      margin: 40px auto 80px;
      padding: 0 40px;
    }
    @media (max-width: 720px) { .painel-container { padding: 0 20px; } }

    .painel-h1 {
      font-family: var(--font-display);
      font-size: clamp(32px, 4vw, 44px);
      font-weight: 300;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin: 0 0 12px;
      line-height: 1.1;
    }
    .painel-lede {
      font-size: 15px;
      color: var(--ink-soft);
      margin-bottom: 32px;
      line-height: 1.65;
      max-width: 56ch;
    }

    /* Tabs editorial (mesmo estilo do /viagem) */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .tab {
      padding: 14px 20px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 400;
      color: var(--ink-muted);
      border-bottom: 2px solid transparent;
      transition: all .15s;
      letter-spacing: 0.01em;
      margin-bottom: -1px;
      white-space: nowrap;
    }
    .tab:hover { color: var(--ink); }
    .tab.active {
      color: var(--ink);
      font-weight: 600;
      border-bottom-color: var(--accent);
    }

    /* Painel (cards de conteúdo) */
    .panel {
      background: var(--paper-elevated);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 32px;
    }
    .panel h2 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--ink);
      margin: 0 0 6px;
      letter-spacing: -0.01em;
    }
    .panel .sub {
      font-size: 13px;
      color: var(--ink-muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    /* Form */
    .form-grid { display: grid; gap: 16px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    label {
      display: block;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }
    .panel input,
    .panel select,
    .panel textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--ink);
      background: var(--paper-elevated);
      outline: none;
      box-sizing: border-box;
      transition: border-color .15s;
    }
    .panel input:focus,
    .panel select:focus,
    .panel textarea:focus { border-color: var(--green-deep); }
    .panel textarea { resize: vertical; min-height: 80px; }

    /* btn-link override (sem the underline arrow do CSS global) */
    .btn-link-plain {
      background: transparent;
      border: none;
      color: var(--ink-muted);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 13px;
      text-decoration: underline;
      padding: 0;
    }
    .btn-link-plain:hover { color: var(--ink); }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .gallery img {
      width: 100%; height: 100px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
    }

    /* Help box (verde sutil) */
    .help-box {
      background: var(--green-soft);
      border-left: 3px solid var(--green-deep);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 13px;
      color: var(--green-deep);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .help-box strong { color: var(--green-deep-hover); }

    /* Pill */
    .pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--gold-soft);
      color: var(--accent-deep);
    }

    /* Login card */
    .login-card {
      max-width: 440px;
      margin: 80px auto;
      background: var(--paper-elevated);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
    }
    .login-card h2 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 0 0 8px;
    }
    .login-card p {
      font-size: 13px;
      color: var(--ink-soft);
      margin-bottom: 22px;
      line-height: 1.55;
    }
    .login-card input {
      width: 100%;
      padding: 12px 0;
      font-family: var(--font-sans);
      font-size: 15px;
      border: none;
      border-bottom: 1px solid var(--line-strong);
      background: transparent;
      color: var(--ink);
      outline: none;
      margin-bottom: 16px;
      transition: border-color .15s;
    }
    .login-card input:focus { border-bottom-color: var(--green-deep); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--paper);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      box-shadow: var(--shadow-lg);
    }
    .toast.error {
      background: #9F2D2D;
      color: #fff;
    }

    /* Orders badge */
    .orders-badge {
      background: var(--accent);
      color: var(--ink);
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      margin-left: 6px;
      display: none;
    }
  </style>
</head>
<body>
  <nav class="bc-nav">
    <a class="bc-logo" href="/">Brasil<em>Connect</em></a>
    <div class="bc-nav-r">
      <a href="/?preview=brasil2026" class="bc-nl">Voltar pro app</a>
    </div>
  </nav>

  <div class="painel-container">
    <div class="eyebrow">Área do assinante</div>
    <h1 class="painel-h1">Painel do Assinante</h1>
    <p class="painel-lede">
      Gerencie seu negócio ou perfil de profissional. Fotos, vídeos, descrição, contato — tudo num lugar só.
    </p>

    <div class="tabs">
      <button class="tab active" data-tab="negocio" onclick="switchTab('negocio')">Meu Negócio</button>
      <button class="tab" data-tab="profissional" onclick="switchTab('profissional')">Profissional (AgendaPro)</button>
      <button class="tab" data-tab="cardapio" onclick="switchTab('cardapio')">Cardápio</button>
      <button class="tab" data-tab="pedidos" onclick="switchTab('pedidos')">Pedidos <span id="orders-badge" class="orders-badge"></span></button>
    </div>

    <div id="content"></div>
  </div>

  <div id="toast" style="display: none;" class="toast"></div>

  <script>
    const STORAGE_KEY = 'bc_assinante_email'
    const root = document.getElementById('content')
    let currentTab = 'negocio'

    function showToast(msg, isError) {
      const t = document.getElementById('toast')
      t.textContent = msg
      t.className = 'toast' + (isError ? ' error' : '')
      t.style.display = 'block'
      setTimeout(() => { t.style.display = 'none' }, 4000)
    }

    function switchTab(tab) {
      currentTab = tab
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab))
      render()
    }

    // Hook pra atualizar status do Restaurant quando voltar do Stripe
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search)
      if (params.get('stripe_done') === '1' || params.get('stripe_refresh') === '1') {
        showToast(params.get('stripe_done') ? 'Stripe configurado! Verificando...' : 'Setup interrompido. Clica em ativar de novo.')
      }
    })

    function getEmail() { try { return sessionStorage.getItem(STORAGE_KEY) } catch (e) { return null } }
    function setEmail(e) { try { sessionStorage.setItem(STORAGE_KEY, e) } catch (_) {} }
    function clearEmail() { try { sessionStorage.removeItem(STORAGE_KEY) } catch (_) {} }

    function renderLogin() {
      root.innerHTML = `
        <div class="login-card">
          <h2>Acesse seu painel</h2>
          <p>Entre com o email cadastrado no seu negócio ou perfil de profissional.</p>
          <input id="loginEmail" type="email" placeholder="seu@email.com" style="margin-bottom: 12px;" />
          <button class="btn-primary" onclick="doLogin()" style="width: 100%;">Entrar →</button>
          <p style="font-size: 11px; margin-top: 14px; color: var(--ink-muted);">
            Ainda não tem cadastro? <a href="/?preview=brasil2026" style="color: var(--green);">Crie seu negócio aqui</a>
          </p>
        </div>
      `
      setTimeout(() => document.getElementById('loginEmail').focus(), 80)
    }

    async function doLogin() {
      const email = document.getElementById('loginEmail').value.trim().toLowerCase()
      if (!email || !email.includes('@')) { showToast('Email inválido', true); return }
      setEmail(email)
      render()
    }

    function logout() {
      clearEmail()
      render()
    }

    async function render() {
      const email = getEmail()
      if (!email) { renderLogin(); return }

      root.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--ink-muted);">Carregando…</div>'

      try {
        if (currentTab === 'negocio') await renderNegocio(email)
        else if (currentTab === 'cardapio') await renderCardapio(email)
        else if (currentTab === 'pedidos') await renderPedidos(email)
        else await renderProfissional(email)
      } catch (e) {
        root.innerHTML = '<div style="padding: 32px; color: #991B1B;">Erro: ' + e.message + '</div>'
      }
    }

    async function renderNegocio(email) {
      // Busca negócio do email
      const r = await fetch('/api/businesses/list?owner_email=' + encodeURIComponent(email))
      const data = await r.json().catch(() => ({}))
      const list = data.businesses || []
      const biz = list[0] || null

      root.innerHTML = `
        <div class="panel">
          ${biz ? '' : '<div class="help-box">Nenhum negócio encontrado pra <strong>' + email + '</strong>. <a href="/?preview=brasil2026" style="color:var(--green);">Cadastre seu negócio</a> primeiro, depois volta aqui pra gerenciar.</div>'}

          <h2>${biz ? biz.name : 'Cadastrar novo negócio'}</h2>
          <p class="sub">${biz ? 'Logado como ' + email : 'Preencha os dados pra começar'} · <button class="btn-link" onclick="logout()">Sair</button></p>

          ${biz ? `
            <div id="restaurant-card" style="background:linear-gradient(135deg,#7c2d12 0%,#b91c1c 100%);color:#fff;padding:18px 20px;border-radius:12px;margin-bottom:18px;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
                <div style="flex:1;min-width:200px;">
                  <div style="font-weight:700;font-size:16px;margin-bottom:4px;">🍽️ Modo Restaurante</div>
                  <div style="font-size:13px;opacity:0.9;line-height:1.5;">
                    Aceite pedidos online com cardápio digital. Cobramos só <b>2.5%</b> por pedido (DoorDash cobra 30%).
                  </div>
                </div>
                <button onclick="openRestaurantOnboard('${biz.id}')" style="background:#fff;color:#b91c1c;border:none;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;">
                  ${biz.stripe_onboarded ? 'Gerenciar' : (biz.stripe_account_id ? 'Continuar setup' : 'Ativar pedidos →')}
                </button>
              </div>
              <div id="restaurant-status" style="margin-top:10px;font-size:12px;opacity:0.85;"></div>
            </div>
          ` : ''}

          <form id="bizForm" class="form-grid" onsubmit="saveBiz(event)">
            <div class="row-2">
              <div>
                <label>Nome do negócio *</label>
                <input name="name" required value="${esc(biz?.name)}" />
              </div>
              <div>
                <label>Categoria *</label>
                <select name="category" required>
                  <option value="">Selecione...</option>
                  <option ${biz?.category==='Restaurante' ? 'selected' : ''}>Restaurante</option>
                  <option ${biz?.category==='Mercado' ? 'selected' : ''}>Mercado</option>
                  <option ${biz?.category==='Salão & Beleza' ? 'selected' : ''}>Salão & Beleza</option>
                  <option ${biz?.category==='Serviços' ? 'selected' : ''}>Serviços</option>
                  <option ${biz?.category==='Saúde' ? 'selected' : ''}>Saúde</option>
                  <option ${biz?.category==='Advocacia' ? 'selected' : ''}>Advocacia</option>
                  <option ${biz?.category==='Construção' ? 'selected' : ''}>Construção</option>
                  <option ${biz?.category==='Outro' ? 'selected' : ''}>Outro</option>
                </select>
              </div>
            </div>

            <div>
              <label>Descrição</label>
              <textarea name="description" rows="3">${esc(biz?.description)}</textarea>
            </div>

            <div class="row-2">
              <div>
                <label>Cidade</label>
                <input name="city" value="${esc(biz?.city)}" />
              </div>
              <div>
                <label>Estado (USPS, ex: TX)</label>
                <input name="state" maxlength="2" value="${esc(biz?.state)}" />
              </div>
            </div>

            <div class="row-2">
              <div>
                <label>Telefone</label>
                <input name="phone" value="${esc(biz?.phone)}" />
              </div>
              <div>
                <label>WhatsApp</label>
                <input name="whatsapp" value="${esc(biz?.whatsapp)}" />
              </div>
            </div>

            <div>
              <label>Website</label>
              <input name="website" type="url" value="${esc(biz?.website)}" />
            </div>

            <div class="row-2">
              <div>
                <label>Instagram</label>
                <input name="instagram" placeholder="@seuhandle" value="${esc(biz?.instagram)}" />
              </div>
              <div>
                <label>TikTok</label>
                <input name="tiktok" placeholder="@seuhandle" value="${esc(biz?.tiktok)}" />
              </div>
            </div>

            <div class="help-box">
              <strong>Fotos e vídeo</strong> — clica em "Escolher arquivo" abaixo (compressão automática até 200KB). Vídeo: cole URL pública do YouTube ou Vimeo.
            </div>

            <div>
              <label>Logo</label>
              <input name="logo_url" type="url" placeholder="https://... ou faça upload abaixo" value="${esc(biz?.logo_url)}" />
              <input type="file" accept="image/*" onchange="uploadFile(this, 'logo_url', 'businesses')" style="margin-top:6px;font-size:12px;" />
              <span id="status-logo_url" style="font-size:11px;color:var(--ink-muted);margin-left:8px;"></span>
            </div>
            <div>
              <label>Foto de capa</label>
              <input name="cover_url" type="url" placeholder="https://... ou faça upload abaixo" value="${esc(biz?.cover_url)}" />
              <input type="file" accept="image/*" onchange="uploadFile(this, 'cover_url', 'businesses')" style="margin-top:6px;font-size:12px;" />
              <span id="status-cover_url" style="font-size:11px;color:var(--ink-muted);margin-left:8px;"></span>
            </div>
            <div>
              <label>Vídeo (YouTube ou Vimeo)</label>
              <input name="video_url" type="url" placeholder="https://youtube.com/watch?v=..." value="${esc(biz?.video_url)}" />
            </div>
            <div>
              <label>Galeria (até 10 fotos)</label>
              <textarea name="gallery_urls" rows="3" placeholder="https://...jpg, https://...jpg">${(biz?.gallery_urls || []).join(', ')}</textarea>
              <input type="file" accept="image/*" multiple onchange="uploadGallery(this, 'businesses')" style="margin-top:6px;font-size:12px;" />
              <span id="status-gallery" style="font-size:11px;color:var(--ink-muted);margin-left:8px;"></span>
              ${biz?.gallery_urls?.length ? '<div class="gallery">' + biz.gallery_urls.map(u => '<img src="' + esc(u) + '" />').join('') + '</div>' : ''}
            </div>

            <div style="margin-top: 8px;">
              <button type="submit" class="btn-primary">Salvar alterações</button>
            </div>
          </form>
        </div>
      `
    }

    async function saveBiz(e) {
      e.preventDefault()
      const form = e.target
      const fd = new FormData(form)
      const body = Object.fromEntries(fd.entries())
      body.owner_email = getEmail()

      // Galeria → array
      if (body.gallery_urls) {
        body.gallery_urls = body.gallery_urls.split(',').map(s => s.trim()).filter(Boolean).slice(0, 10)
      } else {
        body.gallery_urls = []
      }
      body.state = (body.state || '').toUpperCase()

      const btn = form.querySelector('button[type="submit"]')
      btn.disabled = true; btn.textContent = 'Salvando…'

      try {
        const r = await fetch('/api/businesses/submit', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        })
        const data = await r.json()
        if (!r.ok) throw new Error(data.error || 'Erro ao salvar')
        showToast('Salvo!')
        await renderNegocio(getEmail())
      } catch (err) {
        showToast(err.message, true)
        btn.disabled = false; btn.textContent = 'Salvar alterações'
      }
    }

    async function renderProfissional(email) {
      const r = await fetch('/api/agenda/provider?email=' + encodeURIComponent(email)).catch(() => null)
      const data = r ? await r.json().catch(() => ({})) : {}
      const prov = data.provider || null

      root.innerHTML = `
        <div class="panel">
          ${prov ? '' : '<div class="help-box">Nenhum perfil de profissional encontrado pra <strong>' + email + '</strong>. <a href="/agenda" style="color:var(--green);">Cadastre seu perfil aqui</a> primeiro.</div>'}

          <h2>${prov ? prov.name : 'Cadastrar novo perfil'}</h2>
          <p class="sub">${prov ? 'Logado como ' + email : 'Preencha pra aparecer no AgendaPro'} · <button class="btn-link" onclick="logout()">Sair</button></p>

          ${prov ? `
            <div style="background:linear-gradient(135deg,#002776 0%,#0f2340 100%);color:#fff;padding:16px 18px;border-radius:12px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
              <div>
                <div style="font-weight:700;font-size:15px;margin-bottom:2px;">
                  ${prov.plan_status === 'active' || prov.plan_status === 'trialing' ? '✅ Plano: ' + (prov.plan || 'starter').toUpperCase() : '🔓 Sem plano ativo'}
                </div>
                <div style="font-size:12px;opacity:0.85;">
                  ${prov.plan_status === 'trialing' ? 'Em trial gratuito de 14 dias' : prov.plan_status === 'active' ? 'Assinatura ativa' : 'Assine pra liberar agendamentos, lembretes e página própria'}
                </div>
              </div>
              <a href="/agenda/planos" style="background:#ffdf00;color:#002776;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap;">${prov.plan_status === 'active' || prov.plan_status === 'trialing' ? 'Trocar plano' : 'Ver planos →'}</a>
            </div>
          ` : ''}

          <form id="provForm" class="form-grid" onsubmit="saveProv(event)">
            <div class="row-2">
              <div>
                <label>Nome / Nome do salão *</label>
                <input name="name" required value="${esc(prov?.name)}" />
              </div>
              <div>
                <label>Especialidade *</label>
                <input name="specialty" placeholder="Cabeleireira, Manicure, Esteticista..." value="${esc(prov?.specialty)}" />
              </div>
            </div>

            <div>
              <label>Bio / Sobre você</label>
              <textarea name="bio" rows="3">${esc(prov?.bio)}</textarea>
            </div>

            <div class="row-2">
              <div>
                <label>Cidade</label>
                <input name="city" value="${esc(prov?.city)}" />
              </div>
              <div>
                <label>Estado (USPS)</label>
                <input name="state" maxlength="2" value="${esc(prov?.state)}" />
              </div>
            </div>

            <div class="row-2">
              <div>
                <label>WhatsApp *</label>
                <input name="whatsapp" required value="${esc(prov?.whatsapp)}" />
              </div>
              <div>
                <label>Instagram</label>
                <input name="instagram" placeholder="@seuhandle" value="${esc(prov?.instagram)}" />
              </div>
            </div>

            <div class="help-box">
              <strong>Portfólio (fotos antes/depois, vídeo)</strong> — cole URLs públicas. Em breve: upload direto.
            </div>

            <div>
              <label>Avatar / Foto de perfil (URL)</label>
              <input name="avatar_url" type="url" value="${esc(prov?.avatar_url)}" />
            </div>
            <div>
              <label>Foto de capa (URL)</label>
              <input name="cover_url" type="url" value="${esc(prov?.cover_url)}" />
            </div>
            <div>
              <label>Vídeo de apresentação (YouTube/Vimeo)</label>
              <input name="video_url" type="url" value="${esc(prov?.video_url)}" />
            </div>
            <div>
              <label>Galeria do portfólio (URLs separadas por vírgula)</label>
              <textarea name="gallery_urls" rows="3">${(prov?.gallery_urls || []).join(', ')}</textarea>
              ${prov?.gallery_urls?.length ? '<div class="gallery">' + prov.gallery_urls.map(u => '<img src="' + esc(u) + '" />').join('') + '</div>' : ''}
            </div>

            <div style="margin-top: 8px;">
              <button type="submit" class="btn-primary">Salvar alterações</button>
            </div>
          </form>
        </div>
      `
    }

    async function saveProv(e) {
      e.preventDefault()
      const form = e.target
      const fd = new FormData(form)
      const body = Object.fromEntries(fd.entries())
      body.email = getEmail()

      if (body.gallery_urls) {
        body.gallery_urls = body.gallery_urls.split(',').map(s => s.trim()).filter(Boolean).slice(0, 10)
      } else {
        body.gallery_urls = []
      }
      body.state = (body.state || '').toUpperCase()

      const btn = form.querySelector('button[type="submit"]')
      btn.disabled = true; btn.textContent = 'Salvando…'

      try {
        const r = await fetch('/api/agenda/provider', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        })
        const data = await r.json()
        if (!r.ok) throw new Error(data.error || 'Erro ao salvar')
        showToast('Salvo!')
        await renderProfissional(getEmail())
      } catch (err) {
        showToast(err.message, true)
        btn.disabled = false; btn.textContent = 'Salvar alterações'
      }
    }

    function esc(s) {
      if (s === null || s === undefined) return ''
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))
    }

    // ═══ Pedidos (painel do dono) ═══
    let pedidosBiz = null
    let pedidosPolling = null
    let lastNewCount = 0

    async function renderPedidos(email) {
      const r = await fetch('/api/businesses/list?owner_email=' + encodeURIComponent(email))
      const data = await r.json().catch(() => ({}))
      const biz = (data.businesses || [])[0]
      if (!biz) {
        root.innerHTML = '<div class="panel"><div class="help-box">Cadastre seu negócio na aba <strong>Meu Negócio</strong> primeiro.</div></div>'
        return
      }
      pedidosBiz = biz
      await refreshPedidos(true)

      // Inicia polling 30s
      if (pedidosPolling) clearInterval(pedidosPolling)
      pedidosPolling = setInterval(() => refreshPedidos(false), 30000)
    }

    async function refreshPedidos(initial) {
      if (!pedidosBiz) return
      try {
        const r = await fetch('/api/restaurant/orders?action=list&business_id=' + pedidosBiz.id + '&owner_email=' + encodeURIComponent(getEmail()))
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Erro')

        // Som de alerta se chegou pedido novo
        if (!initial && d.new_count > lastNewCount) playAlertSound()
        lastNewCount = d.new_count

        // Badge no tab
        const badge = document.getElementById('orders-badge')
        if (d.new_count > 0) {
          badge.style.display = 'inline-block'
          badge.textContent = d.new_count
        } else {
          badge.style.display = 'none'
        }

        // Renderiza so se a tab atual for pedidos
        if (currentTab === 'pedidos') drawPedidos(d.orders || [])
      } catch (e) {
        console.error('refreshPedidos:', e.message)
      }
    }

    function drawPedidos(orders) {
      const groups = { confirmed: [], preparing: [], ready: [], delivered: [], canceled: [], pending: [] }
      orders.forEach(o => { (groups[o.status] || groups.pending).push(o) })

      const totalActive = groups.confirmed.length + groups.preparing.length + groups.ready.length

      root.innerHTML = `
        <div class="panel">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
            <h2>📋 Pedidos</h2>
            <button onclick="refreshPedidos(false)" style="background:transparent;border:1px solid var(--line);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;">🔄 Atualizar</button>
          </div>
          <p class="sub">${totalActive} ativos · ${groups.delivered.length} entregues hoje · auto-refresh a cada 30s</p>

          ${columnsHtml('🟢 Confirmados', groups.confirmed, 'preparing', 'Começar preparo')}
          ${columnsHtml('👨‍🍳 Em preparo', groups.preparing, 'ready', 'Marcar pronto')}
          ${columnsHtml('🛍️ Prontos', groups.ready, 'delivered', 'Marcar entregue')}

          ${groups.delivered.length > 0 ? `
            <details style="margin-top:18px;">
              <summary style="cursor:pointer;font-weight:600;font-size:14px;color:var(--ink-soft);">Entregues recentes (${groups.delivered.length})</summary>
              <div style="margin-top:10px;">
                ${groups.delivered.slice(0, 10).map(o => orderCard(o, null, null, true)).join('')}
              </div>
            </details>
          ` : ''}

          ${orders.length === 0 ? '<div class="help-box">Nenhum pedido ainda. Quando chegar, vai aparecer aqui com som de alerta.</div>' : ''}
        </div>
      `
    }

    function columnsHtml(title, orders, nextStatus, nextLabel) {
      if (orders.length === 0) return ''
      return '<div style="margin-bottom:18px;"><h3 style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--ink-soft);">' + title + ' (' + orders.length + ')</h3>'
        + orders.map(o => orderCard(o, nextStatus, nextLabel, false)).join('')
        + '</div>'
    }

    function orderCard(o, nextStatus, nextLabel, compact) {
      const ageMin = Math.round((Date.now() - new Date(o.created_at).getTime()) / 60000)
      const itemsList = (o.items || []).map(i => i.quantity + 'x ' + esc(i.item_name) + (i.notes ? ' (' + esc(i.notes) + ')' : '')).join(' · ')
      return `
        <div style="background:${compact ? 'var(--paper)' : '#fff'};border:1px solid var(--line);border-radius:10px;padding:${compact ? '10px 12px' : '14px 16px'};margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
            <div>
              <div style="font-weight:700;font-size:${compact ? '13' : '15'}px;">#${o.order_number} · ${esc(o.customer_name || o.customer_email)}</div>
              <div style="font-size:11px;color:var(--ink-muted);">${ageMin}min atrás · ${o.type === 'delivery' ? '🛵 Delivery' : '🛍️ Pickup'} · ${o.customer_phone ? esc(o.customer_phone) : ''}</div>
            </div>
            <div style="font-weight:700;color:var(--green);font-size:${compact ? '14' : '16'}px;">$${(o.total_cents / 100).toFixed(2)}</div>
          </div>
          ${!compact ? '<div style="font-size:12px;color:var(--ink-soft);background:var(--paper);padding:8px;border-radius:6px;margin-bottom:8px;">' + esc(itemsList) + '</div>' : ''}
          ${o.notes && !compact ? '<div style="font-size:12px;color:#92400e;background:#fef3c7;padding:6px 10px;border-radius:6px;margin-bottom:8px;">📝 ' + esc(o.notes) + '</div>' : ''}
          ${o.type === 'delivery' && o.delivery_address && !compact ? '<div style="font-size:12px;color:var(--ink-soft);margin-bottom:8px;">📍 ' + esc(o.delivery_address) + (o.delivery_city ? ', ' + esc(o.delivery_city) : '') + '</div>' : ''}
          ${nextStatus ? `
            <div style="display:flex;gap:6px;">
              <button onclick="updateOrderStatus('${o.id}','${nextStatus}')" class="btn-primary" style="padding:8px 14px;font-size:12px;flex:1;">${nextLabel} →</button>
              <button onclick="cancelOrder('${o.id}')" style="background:transparent;border:1px solid #fca5a5;color:#991b1b;padding:8px 12px;border-radius:6px;font-size:12px;cursor:pointer;">Cancelar</button>
            </div>
          ` : ''}
        </div>
      `
    }

    async function updateOrderStatus(orderId, status) {
      try {
        const r = await fetch('/api/restaurant/orders?action=update-status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ business_id: pedidosBiz.id, owner_email: getEmail(), order_id: orderId, status }),
        })
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Erro')
        showToast('Status atualizado: ' + status)
        refreshPedidos(false)
      } catch (e) { showToast(e.message, true) }
    }

    async function cancelOrder(orderId) {
      const reason = prompt('Motivo do cancelamento (cliente vai ver):', '')
      if (reason === null) return
      try {
        const r = await fetch('/api/restaurant/orders?action=update-status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ business_id: pedidosBiz.id, owner_email: getEmail(), order_id: orderId, status: 'canceled', cancel_reason: reason }),
        })
        if (!r.ok) throw new Error((await r.json()).error || 'Erro')
        showToast('Pedido cancelado.')
        refreshPedidos(false)
      } catch (e) { showToast(e.message, true) }
    }

    function playAlertSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)()
        const o = ctx.createOscillator(), g = ctx.createGain()
        o.type = 'sine'; o.frequency.setValueAtTime(880, ctx.currentTime)
        o.frequency.setValueAtTime(660, ctx.currentTime + 0.15)
        o.frequency.setValueAtTime(880, ctx.currentTime + 0.30)
        g.gain.setValueAtTime(0.3, ctx.currentTime)
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5)
        o.connect(g); g.connect(ctx.destination)
        o.start(); o.stop(ctx.currentTime + 0.5)
        showToast('🔔 Pedido novo!')
      } catch (e) { /* ignore audio failures */ }
    }

    // ═══ Cardapio (CRUD menu) ═══
    let cardapioBiz = null
    let cardapioCats = []
    let cardapioItems = []

    async function renderCardapio(email) {
      // Busca o negocio pelo email
      const r = await fetch('/api/businesses/list?owner_email=' + encodeURIComponent(email))
      const data = await r.json().catch(() => ({}))
      const biz = (data.businesses || [])[0]

      if (!biz) {
        root.innerHTML = '<div class="panel"><div class="help-box">Cadastre seu negócio na aba <strong>Meu Negócio</strong> primeiro.</div></div>'
        return
      }
      cardapioBiz = biz

      // Busca status Stripe
      const sr = await fetch('/api/restaurant/status?business_id=' + biz.id)
      const sd = await sr.json().catch(() => ({}))
      const ready = sd.business?.ready_for_orders

      if (!ready) {
        root.innerHTML = `
          <div class="panel">
            <h2>🍽️ Cardápio</h2>
            <p class="sub">Disponível depois que você ativar pedidos online.</p>
            <div class="help-box">
              <strong>Antes de criar o cardápio</strong> — vai na aba <strong>Meu Negócio</strong> e clica em <strong>"Ativar pedidos →"</strong>. Você precisa terminar o setup do Stripe (LLC, conta bancária) pra começar a receber pedidos.
            </div>
          </div>
        `
        return
      }

      // Carrega menu
      const mr = await fetch('/api/restaurant/menu?action=list&business_id=' + biz.id)
      const md = await mr.json().catch(() => ({}))
      cardapioCats = md.categories || []
      cardapioItems = md.items || []

      const ordersToggle = biz.accepts_orders
        ? '<button onclick="toggleAcceptsOrders(false)" style="background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">⏸️ Pausar pedidos</button>'
        : '<button onclick="toggleAcceptsOrders(true)" style="background:#dcfce7;color:#166534;border:1px solid #86efac;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">▶️ Aceitar pedidos</button>'

      root.innerHTML = `
        <div class="panel">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px;">
            <div>
              <h2>🍽️ Cardápio de ${esc(biz.name)}</h2>
              <p class="sub" style="margin-bottom:0;">${cardapioCats.length} categorias · ${cardapioItems.length} itens · ${cardapioItems.filter(i=>i.available).length} disponíveis</p>
            </div>
            ${ordersToggle}
          </div>

          <div class="help-box" style="background:#FEF3C7;color:#78350f;border-color:#fbbf24;">
            <strong>${biz.accepts_orders ? '✅ Aceitando pedidos' : '⏸️ Pedidos pausados'}</strong> — público vê o cardápio em <a href="/negocio/${biz.slug}/cardapio" target="_blank" style="color:#92400e;text-decoration:underline;">brasilconnectusa.com/negocio/${biz.slug}/cardapio</a>
          </div>

          <div style="display:flex;gap:8px;margin:18px 0;">
            <button class="btn-primary" onclick="editCategory(null)">+ Categoria</button>
            <button class="btn-primary" onclick="editItem(null)" style="background:var(--green);">+ Item</button>
          </div>

          <div id="cardapio-list">
            ${cardapioCats.length === 0 ? '<div class="help-box">Comece criando uma categoria (ex: "Pratos principais", "Sobremesas")</div>' : ''}
            ${cardapioCats.map(cat => `
              <div style="background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                  <strong style="font-size:15px;">${esc(cat.name)}</strong>
                  <div style="display:flex;gap:6px;">
                    <button onclick="editCategory('${cat.id}')" style="background:transparent;border:1px solid var(--line);padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;">Editar</button>
                    <button onclick="deleteCategory('${cat.id}','${esc(cat.name)}')" style="background:transparent;border:1px solid #fca5a5;color:#991b1b;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;">Excluir</button>
                  </div>
                </div>
                ${cardapioItems.filter(i => i.category_id === cat.id).map(item => itemRow(item)).join('') || '<div style="font-size:12px;color:var(--ink-muted);font-style:italic;">Nenhum item nessa categoria ainda</div>'}
              </div>
            `).join('')}
            ${cardapioItems.filter(i => !i.category_id).length > 0 ? `
              <div style="background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;">
                <strong style="font-size:14px;color:var(--ink-muted);">Sem categoria</strong>
                ${cardapioItems.filter(i => !i.category_id).map(itemRow).join('')}
              </div>
            ` : ''}
          </div>
        </div>
      `
    }

    function itemRow(item) {
      const price = (item.price_cents / 100).toLocaleString('en-US', { style: 'currency', currency: 'USD' })
      return `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line);">
          ${item.photo_url ? '<img src="' + esc(item.photo_url) + '" style="width:48px;height:48px;object-fit:cover;border-radius:6px;" />' : '<div style="width:48px;height:48px;background:var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--ink-muted);font-size:20px;">🍽️</div>'}
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:13px;">${esc(item.name)} <span style="color:var(--green);font-weight:700;">${price}</span></div>
            <div style="font-size:11px;color:var(--ink-muted);">${item.description ? esc(item.description.slice(0,80)) : ''}</div>
          </div>
          <label style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;">
            <input type="checkbox" ${item.available ? 'checked' : ''} onchange="toggleItemAvailable('${item.id}', this.checked)" style="width:auto;" />
            ${item.available ? 'Disponível' : 'Esgotado'}
          </label>
          <button onclick="editItem('${item.id}')" style="background:transparent;border:1px solid var(--line);padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;">Editar</button>
        </div>
      `
    }

    async function toggleAcceptsOrders(on) {
      try {
        const r = await fetch('/api/restaurant/menu?action=activate-orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ business_id: cardapioBiz.id, owner_email: getEmail(), accepts_orders: on }),
        })
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Erro')
        cardapioBiz.accepts_orders = on
        showToast(on ? 'Pedidos ativos!' : 'Pedidos pausados.')
        renderCardapio(getEmail())
      } catch (e) { showToast(e.message, true) }
    }

    async function toggleItemAvailable(itemId, available) {
      try {
        await fetch('/api/restaurant/menu?action=toggle-available', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ business_id: cardapioBiz.id, owner_email: getEmail(), item_id: itemId, available }),
        })
      } catch (e) { showToast(e.message, true) }
    }

    function editCategory(id) {
      const cat = id ? cardapioCats.find(c => c.id === id) : { name: '', display_order: cardapioCats.length }
      const name = prompt('Nome da categoria (ex: Pratos principais):', cat.name || '')
      if (!name) return
      saveCategory({ ...cat, name, id: cat.id || null })
    }

    async function saveCategory(category) {
      try {
        const r = await fetch('/api/restaurant/menu?action=save-category', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ business_id: cardapioBiz.id, owner_email: getEmail(), category }),
        })
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Erro')
        showToast('Categoria salva!')
        renderCardapio(getEmail())
      } catch (e) { showToast(e.message, true) }
    }

    async function deleteCategory(id, name) {
      if (!confirm('Excluir categoria "' + name + '"? Items dentro ficam sem categoria.')) return
      try {
        await fetch('/api/restaurant/menu?action=delete-category', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ business_id: cardapioBiz.id, owner_email: getEmail(), category_id: id }),
        })
        showToast('Categoria excluída.')
        renderCardapio(getEmail())
      } catch (e) { showToast(e.message, true) }
    }

    function editItem(id) {
      const item = id ? cardapioItems.find(i => i.id === id) : { name: '', price_cents: 0, available: true, display_order: cardapioItems.length }
      openItemModal(item)
    }

    function openItemModal(item) {
      const catOptions = cardapioCats.map(c => '<option value="' + c.id + '"' + (c.id === item.category_id ? ' selected' : '') + '>' + esc(c.name) + '</option>').join('')
      const modalHTML = `
        <div id="item-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;" onclick="if(event.target.id==='item-modal')document.getElementById('item-modal').remove()">
          <div style="background:#fff;border-radius:14px;padding:24px;width:100%;max-width:500px;">
            <h3 style="font-family:'Fraunces',serif;color:var(--navy);margin-bottom:14px;">${item.id ? 'Editar' : 'Novo'} item</h3>
            <form id="item-form" onsubmit="submitItem(event, '${item.id || ''}')">
              <div style="margin-bottom:10px;"><label>Nome *</label><input name="name" required value="${esc(item.name)}" /></div>
              <div style="margin-bottom:10px;"><label>Descrição</label><textarea name="description" rows="2">${esc(item.description)}</textarea></div>
              <div class="row-2" style="margin-bottom:10px;">
                <div><label>Preço (USD) *</label><input name="price" type="number" step="0.01" min="0.5" required value="${(item.price_cents || 0) / 100}" /></div>
                <div><label>Categoria</label><select name="category_id"><option value="">Sem categoria</option>${catOptions}</select></div>
              </div>
              <div style="margin-bottom:10px;">
                <label>Foto</label>
                <input name="photo_url" type="url" placeholder="https://... ou upload abaixo" value="${esc(item.photo_url)}" />
                <input type="file" accept="image/*" onchange="uploadFile(this, 'photo_url', 'menu')" style="margin-top:6px;font-size:12px;" />
                <span id="status-photo_url" style="font-size:11px;color:var(--ink-muted);"></span>
              </div>
              <div style="margin-bottom:10px;"><label>Ingredientes (opcional)</label><input name="ingredients" placeholder="Frango, arroz, feijão..." value="${esc(item.ingredients)}" /></div>
              <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;font-size:13px;">
                <label style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink);"><input type="checkbox" name="available" ${item.available !== false ? 'checked' : ''} style="width:auto;margin-right:4px;" /> Disponível</label>
                <label style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink);"><input type="checkbox" name="is_vegetarian" ${item.is_vegetarian ? 'checked' : ''} style="width:auto;margin-right:4px;" /> Vegetariano</label>
                <label style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink);"><input type="checkbox" name="is_gluten_free" ${item.is_gluten_free ? 'checked' : ''} style="width:auto;margin-right:4px;" /> Sem glúten</label>
                <label style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink);"><input type="checkbox" name="is_spicy" ${item.is_spicy ? 'checked' : ''} style="width:auto;margin-right:4px;" /> Picante 🌶️</label>
              </div>
              <div style="display:flex;gap:8px;justify-content:flex-end;">
                ${item.id ? '<button type="button" onclick="deleteItem(\''+item.id+'\',\''+esc(item.name)+'\')" style="background:transparent;border:1px solid #fca5a5;color:#991b1b;padding:10px 16px;border-radius:8px;font-size:13px;cursor:pointer;">Excluir</button>' : ''}
                <button type="button" onclick="document.getElementById('item-modal').remove()" style="background:transparent;border:1px solid var(--line);color:var(--ink-soft);padding:10px 16px;border-radius:8px;font-size:13px;cursor:pointer;">Cancelar</button>
                <button type="submit" class="btn-primary">Salvar</button>
              </div>
            </form>
          </div>
        </div>
      `
      document.body.insertAdjacentHTML('beforeend', modalHTML)
    }

    async function submitItem(e, id) {
      e.preventDefault()
      const fd = new FormData(e.target)
      const item = {
        id: id || null,
        name: fd.get('name'),
        description: fd.get('description') || '',
        price_cents: Math.round(Number(fd.get('price')) * 100),
        category_id: fd.get('category_id') || null,
        photo_url: fd.get('photo_url') || null,
        ingredients: fd.get('ingredients') || null,
        available: fd.get('available') === 'on',
        is_vegetarian: fd.get('is_vegetarian') === 'on',
        is_gluten_free: fd.get('is_gluten_free') === 'on',
        is_spicy: fd.get('is_spicy') === 'on',
      }
      try {
        const r = await fetch('/api/restaurant/menu?action=save-item', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ business_id: cardapioBiz.id, owner_email: getEmail(), item }),
        })
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Erro')
        document.getElementById('item-modal').remove()
        showToast('Item salvo!')
        renderCardapio(getEmail())
      } catch (err) { showToast(err.message, true) }
    }

    async function deleteItem(id, name) {
      if (!confirm('Excluir "' + name + '"?')) return
      try {
        await fetch('/api/restaurant/menu?action=delete-item', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ business_id: cardapioBiz.id, owner_email: getEmail(), item_id: id }),
        })
        document.getElementById('item-modal')?.remove()
        showToast('Item excluído.')
        renderCardapio(getEmail())
      } catch (e) { showToast(e.message, true) }
    }

    // ═══ Restaurant onboard (Stripe Connect Express) ═══
    async function openRestaurantOnboard(businessId) {
      const status = document.getElementById('restaurant-status')
      status.textContent = 'Conectando com Stripe...'
      try {
        const r = await fetch('/api/restaurant/onboard', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ business_id: businessId, owner_email: getEmail() }),
        })
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Erro')
        status.innerHTML = 'Abrindo Stripe em nova aba...'
        window.open(d.onboarding_url, '_blank', 'noopener')
      } catch (e) {
        status.style.color = '#fff'
        status.innerHTML = '⚠️ ' + e.message
      }
    }

    async function checkRestaurantStatus(businessId) {
      try {
        const r = await fetch('/api/restaurant/status?business_id=' + businessId)
        const d = await r.json()
        if (!r.ok || !d.business) return
        const status = document.getElementById('restaurant-status')
        if (!status) return
        const b = d.business
        if (b.ready_for_orders) {
          status.innerHTML = '✅ Conta Stripe pronta. Próximo passo: adicionar items no cardápio.'
        } else if (b.stripe_onboarded) {
          status.innerHTML = '⏳ Stripe revisando seus dados (geralmente 24h). Volta depois.'
        } else if (b.has_stripe_account) {
          status.innerHTML = '📋 Setup começou mas não terminou. Clica "Continuar setup" pra finalizar.'
        }
      } catch (e) { /* ignore */ }
    }

    // ═══ Upload helpers (compressao client-side + Supabase Storage) ═══
    async function compressImage(file, maxDim = 1024, quality = 0.82) {
      const img = await new Promise((resolve, reject) => {
        const i = new Image()
        i.onload = () => resolve(i)
        i.onerror = reject
        i.src = URL.createObjectURL(file)
      })
      let w = img.width, h = img.height
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim }
        else { w = Math.round(w * maxDim / h); h = maxDim }
      }
      const canvas = document.createElement('canvas')
      canvas.width = w; canvas.height = h
      canvas.getContext('2d').drawImage(img, 0, 0, w, h)
      return canvas.toDataURL('image/jpeg', quality)
    }

    async function uploadOne(file, folder) {
      const email = getEmail() || 'anon'
      const dataUrl = await compressImage(file)
      const r = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ file_data: dataUrl, folder, email }),
      })
      const d = await r.json()
      if (!r.ok) throw new Error(d.error || 'Erro no upload')
      return d.url
    }

    async function uploadFile(input, fieldName, folder) {
      const file = input.files[0]
      if (!file) return
      const status = document.getElementById('status-' + fieldName)
      if (status) { status.style.color = 'var(--ink-muted)'; status.textContent = 'Comprimindo...' }
      try {
        const url = await uploadOne(file, folder)
        const target = document.querySelector('[name="' + fieldName + '"]')
        if (target) target.value = url
        if (status) { status.style.color = '#16a34a'; status.textContent = '✓ Enviado' }
      } catch (e) {
        if (status) { status.style.color = '#dc2626'; status.textContent = e.message }
      }
    }

    async function uploadGallery(input, folder) {
      const files = Array.from(input.files || []).slice(0, 10)
      if (!files.length) return
      const status = document.getElementById('status-gallery')
      const target = document.querySelector('[name="gallery_urls"]')
      if (status) { status.style.color = 'var(--ink-muted)'; status.textContent = '0/' + files.length + ' enviadas...' }
      const urls = []
      for (let i = 0; i < files.length; i++) {
        try {
          const url = await uploadOne(files[i], folder)
          urls.push(url)
          if (status) status.textContent = (i + 1) + '/' + files.length + ' enviadas...'
        } catch (e) {
          if (status) { status.style.color = '#dc2626'; status.textContent = 'Erro: ' + e.message; return }
        }
      }
      const existing = target?.value ? target.value.split(',').map(s => s.trim()).filter(Boolean) : []
      const all = [...existing, ...urls].slice(0, 10)
      if (target) target.value = all.join(', ')
      if (status) { status.style.color = '#16a34a'; status.textContent = '✓ ' + urls.length + ' enviadas' }
    }

    render()
  </script>
</body>
