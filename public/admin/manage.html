<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin · Gerenciar · BrasilConnect USA</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/premium.css">
  <style>
    body { background: var(--paper); }
    .admin-topbar { background: var(--paper-elevated); border-bottom: 1px solid var(--line); padding: 18px 24px; }
    .admin-topbar .brand { display: flex; align-items: center; gap: 14px; max-width: 1400px; margin: 0 auto; flex-wrap: wrap; }
    .admin-topbar .nav-links { display: flex; gap: 14px; margin-left: 8px; flex-wrap: wrap; }
    .admin-topbar .nav-links a { font-size: 13px; color: var(--ink-soft); text-decoration: none; }
    .admin-topbar .nav-links a.active { color: var(--brand-green); font-weight: 600; }
    .admin-topbar .meta { margin-left: auto; font-size: 13px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; }

    .admin-container { max-width: 1200px; margin: 24px auto; padding: 0 24px; }

    .tabs-row { display: flex; gap: 4px; background: var(--paper-soft); border-radius: 10px; padding: 4px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 10px 14px; border: none; background: transparent; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; border-radius: 8px; color: var(--ink-muted); }
    .tab-btn.active { background: var(--paper-elevated); color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,.08); }

    .panel { background: var(--paper-elevated); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 24px 28px; margin-bottom: 18px; }
    .panel h3 { font-family: var(--font-display); margin: 0 0 6px 0; color: var(--ink); font-size: 1.2rem; font-weight: 600; }
    .panel-eyebrow { text-transform: uppercase; letter-spacing: 0.18em; font-size: 10px; font-weight: 600; color: var(--brand-gold-dark); margin-bottom: 6px; }
    .panel-sub { color: var(--ink-muted); font-size: 13px; margin: 0 0 16px 0; }

    .item { padding: 14px 16px; border: 1px solid var(--line); border-radius: var(--r-md); margin-bottom: 8px; }
    .item .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; flex-wrap: wrap; gap: 8px; }
    .item .name { font-weight: 700; color: var(--ink); font-size: 14px; }
    .item .meta { font-size: 11px; color: var(--ink-muted); }
    .item .answer { font-size: 13px; color: var(--ink-soft); padding: 8px 10px; background: var(--paper); border-radius: 6px; margin: 8px 0; line-height: 1.5; }
    .item .actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn-mini { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; }
    .btn-approve { background: #10B981; color: #fff; }
    .btn-reject  { background: #EF4444; color: #fff; }
    .btn-mark    { background: var(--ink); color: var(--paper); }

    .login-card { max-width: 380px; margin: 80px auto; background: var(--paper-elevated); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 36px 28px; text-align: center; }
    .login-card .eyebrow { text-transform: uppercase; letter-spacing: 0.18em; font-size: 11px; font-weight: 600; color: var(--brand-gold-dark); margin-bottom: 12px; }
    .login-card h2 { font-family: var(--font-display); font-size: 1.6rem; font-weight: 600; margin: 0 0 8px 0; }
    .login-card input { width: 100%; padding: 12px 14px; font-size: 14px; border: 1px solid var(--line); border-radius: var(--r-md); margin-bottom: 12px; box-sizing: border-box; font-family: inherit; outline: none; background: var(--paper); }
    .err-banner { background: #FBE9E7; color: #802020; border: 1px solid #E8C2BC; padding: 10px 14px; border-radius: var(--r-sm); font-size: 13px; margin-bottom: 14px; text-align: left; }
    .empty { padding: 32px; text-align: center; color: var(--ink-muted); font-style: italic; font-size: 13px; }

    /* ─── Tab Usuários ──────────────────────────────────────────────── */
    .users-toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
    .users-toolbar input, .users-toolbar select { padding: 8px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 13px; background: var(--paper-elevated); font-family: inherit; outline: none; }
    .users-toolbar input { min-width: 240px; }
    .users-toolbar .filter-pill { font-size: 12px; color: var(--ink-muted); background: var(--paper-soft); padding: 6px 10px; border-radius: 12px; }
    .users-summary { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 12px; font-size: 12px; color: var(--ink-muted); }
    .users-summary b { color: var(--ink); font-weight: 700; }

    .users-table { width: 100%; border-collapse: collapse; background: var(--paper-elevated); border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden; font-size: 13px; }
    .users-table th { text-align: left; padding: 10px 12px; background: var(--paper-soft); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-muted); font-weight: 600; border-bottom: 1px solid var(--line); }
    .users-table td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    .users-table tr:hover td { background: #FBFAF6; cursor: pointer; }
    .users-table .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--paper-soft); display: inline-block; vertical-align: middle; margin-right: 10px; object-fit: cover; }
    .users-table .badge { display: inline-block; padding: 1px 7px; border-radius: 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-right: 4px; }
    .b-onb { background: #DCFCE7; color: #166534; }
    .b-noonb { background: #FEF3C7; color: #92400E; }
    .b-ban { background: #FECACA; color: #991B1B; }
    .b-biz { background: #DBEAFE; color: #1E40AF; }
    .b-role { background: #E9D5FF; color: #6B21A8; }

    .bulk-bar { display: none; align-items: center; gap: 10px; background: var(--brand-navy, #001a5e); color: #fff; padding: 10px 16px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .bulk-bar.active { display: flex; }
    .bulk-bar button { background: var(--brand-gold, #FFD700); color: #1a1a1a; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 12px; }

    /* Drawer */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 998; display: none; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; top: 0; right: 0; height: 100vh; width: min(760px, 100vw); background: #fff; z-index: 999; box-shadow: -8px 0 32px rgba(0,0,0,0.2); overflow-y: auto; transform: translateX(100%); transition: transform 0.22s ease; }
    .drawer.open { transform: translateX(0); }
    .drawer-head { position: sticky; top: 0; background: #fff; padding: 18px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 12px; z-index: 2; }
    .drawer-head .x { background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--ink-muted); margin-left: auto; padding: 0 4px; }
    .drawer-head .x:hover { color: var(--ink); }
    .drawer-body { padding: 20px 24px 60px; }
    .drawer-section { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px dashed var(--line); }
    .drawer-section:last-child { border-bottom: none; }
    .drawer-section h4 { margin: 0 0 10px 0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--brand-gold-dark, #B8860B); font-weight: 700; }
    .kv { display: grid; grid-template-columns: 160px 1fr; gap: 4px 14px; font-size: 13px; }
    .kv dt { color: var(--ink-muted); }
    .kv dd { margin: 0; color: var(--ink); word-break: break-word; }
    .drawer-section .mini-list { font-size: 12px; color: var(--ink-soft); }
    .drawer-section .mini-list li { padding: 4px 0; border-bottom: 1px solid var(--line); list-style: none; }
    .drawer-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .drawer-actions button { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--line); background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }
    .drawer-actions .danger { background: #FEE2E2; border-color: #FCA5A5; color: #991B1B; }
    .drawer-actions .primary { background: var(--brand-green, #009C3B); border-color: var(--brand-green, #009C3B); color: #fff; }
    .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; }
    .edit-grid label { display: flex; flex-direction: column; font-size: 11px; color: var(--ink-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .edit-grid input, .edit-grid select, .edit-grid textarea { margin-top: 4px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; background: #fff; }
    .edit-grid textarea { grid-column: span 2; resize: vertical; min-height: 60px; }
    .edit-grid .span2 { grid-column: span 2; }

    /* Modal email */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1001; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 24px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { margin: 0 0 6px 0; font-family: var(--font-display); }
    .modal .muted { font-size: 13px; color: var(--ink-muted); margin: 0 0 14px 0; }
    .modal input, .modal textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 6px; font-size: 14px; font-family: inherit; box-sizing: border-box; margin-bottom: 10px; outline: none; }
    .modal textarea { min-height: 180px; resize: vertical; line-height: 1.55; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const STORAGE_KEY = 'bc_admin_secret'
    const root = document.getElementById('app')
    const getSecret = () => { try { return sessionStorage.getItem(STORAGE_KEY) || '' } catch (e) { return '' } }
    const setSecret = s => { try { sessionStorage.setItem(STORAGE_KEY, s) } catch (e) {} }
    const clearSecret = () => { try { sessionStorage.removeItem(STORAGE_KEY) } catch (e) {} }
    const escapeHtml = s => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))

    let currentTab = 'requests'

    function topbar(active) {
      return `
        <div class="admin-topbar">
          <div class="brand">
            <a href="/admin" style="text-decoration:none;font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:600;color:var(--brand-navy);letter-spacing:-0.01em;"><span>Brasil</span><em style="color:var(--brand-gold);font-style:normal;font-weight:600;">Connect</em></a>
            <div class="nav-links">
              <a href="/admin/mindmap">Mind Map</a>
              <a href="/admin/manage" class="active">Gerenciar</a>
              <a href="/admin/waitlist">Lista de espera</a>
              <a href="/admin/analytics">Analytics</a>
              <a href="/admin/utm-builder">UTM Builder</a>
              <a href="/admin/roadmap">Roadmap</a>
              <a href="/admin/parceiros">Parceiros</a>
            </div>
            <div class="meta">Admin Console</div>
          </div>
        </div>
      `
    }

    function renderLogin(errMsg) {
      root.innerHTML = topbar() + `
        <div class="login-card">
          <div class="eyebrow">ACESSO RESTRITO</div>
          <h2>Gerenciar plataforma</h2>
          <p class="muted">Aprove pedidos de comunidades restritas, leia mensagens, gerencie negócios.</p>
          ${errMsg ? `<div class="err-banner">${escapeHtml(errMsg)}</div>` : ''}
          <input id="secret" type="password" placeholder="ADMIN_SECRET" autocomplete="off" />
          <button class="btn btn-primary" id="loginBtn" style="width:100%;">Entrar</button>
        </div>
      `
      document.getElementById('loginBtn').onclick = doLogin
      document.getElementById('secret').onkeydown = e => { if (e.key === 'Enter') doLogin() }
      setTimeout(() => document.getElementById('secret').focus(), 80)
    }

    async function doLogin() {
      const v = document.getElementById('secret').value.trim()
      if (!v) return
      try {
        const r = await fetch('/api/admin/analytics', { headers: { 'x-admin-secret': v } })
        if (r.status === 401) return renderLogin('Senha incorreta')
        setSecret(v)
        renderDashboard()
      } catch (e) {
        setSecret(v)
        renderDashboard()
      }
    }

    async function renderDashboard() {
      root.innerHTML = topbar('manage') + `
        <div class="admin-container">
          <div class="tabs-row">
            <button class="tab-btn ${currentTab==='requests'?'active':''}" onclick="switchTab('requests')">Pedidos pendentes</button>
            <button class="tab-btn ${currentTab==='contact'?'active':''}" onclick="switchTab('contact')">Fale Conosco</button>
            <button class="tab-btn ${currentTab==='enterprise'?'active':''}" onclick="switchTab('enterprise')">Leads Enterprise</button>
            <button class="tab-btn ${currentTab==='reports'?'active':''}" onclick="switchTab('reports')">Moderação</button>
            <button class="tab-btn ${currentTab==='agent'?'active':''}" onclick="switchTab('agent')">Moderação IA</button>
            <button class="tab-btn ${currentTab==='feedback'?'active':''}" onclick="switchTab('feedback')">Feedback</button>
            <button class="tab-btn ${currentTab==='businesses'?'active':''}" onclick="switchTab('businesses')">Negócios</button>
            <button class="tab-btn ${currentTab==='restaurant-orders'?'active':''}" onclick="switchTab('restaurant-orders')">Pedidos Restaurante</button>
            <button class="tab-btn ${currentTab==='bolao'?'active':''}" onclick="switchTab('bolao')">Bolão Copa</button>
            <button class="tab-btn ${currentTab==='users'?'active':''}" onclick="switchTab('users')">Usuários</button>
            <button class="tab-btn ${currentTab==='sponsors'?'active':''}" onclick="switchTab('sponsors')">Patrocinadores</button>
            <button class="tab-btn ${currentTab==='usage'?'active':''}" onclick="switchTab('usage')">Uso & Limites</button>
          </div>
          <div id="tab-content"><p class="muted">Carregando…</p></div>
        </div>
      `
      loadTab(currentTab)
    }

    async function loadTab(tab) {
      const c = document.getElementById('tab-content')
      c.innerHTML = '<p class="muted" style="padding:20px;">Carregando…</p>'
      try {
        if (tab === 'requests')   await loadRequests(c)
        else if (tab === 'contact')    await loadContact(c)
        else if (tab === 'enterprise') await loadEnterprise(c)
        else if (tab === 'reports')    await loadReports(c)
        else if (tab === 'agent')      await loadAgent(c)
        else if (tab === 'feedback')   await loadFeedback(c)
        else if (tab === 'businesses') await loadBusinesses(c)
        else if (tab === 'restaurant-orders') await loadRestaurantOrders(c)
        else if (tab === 'bolao')      await loadBolao(c)
        else if (tab === 'users')      await loadUsers(c)
        else if (tab === 'sponsors')   await loadSponsors(c)
        else if (tab === 'usage')      await loadUsage(c)
      } catch (e) {
        c.innerHTML = '<div class="err-banner">' + escapeHtml(e.message) + '</div>'
      }
    }

    function switchTab(tab) {
      currentTab = tab
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
      event.target.classList.add('active')
      loadTab(tab)
    }

    async function loadRequests(c) {
      const r = await fetch('/api/social?action=pending-requests', { headers: { 'x-admin-secret': getSecret() } })
      const data = await r.json()
      if (!r.ok) throw new Error(data.error || 'Erro')
      const reqs = data.requests || []
      if (reqs.length === 0) { c.innerHTML = '<div class="panel"><div class="empty">Nenhum pedido pendente. ✓</div></div>'; return }

      c.innerHTML = '<div class="panel"><div class="panel-eyebrow">PEDIDOS PRA APROVAR</div><h3>' + reqs.length + ' pedido' + (reqs.length === 1 ? '' : 's') + ' aguardando</h3><p class="panel-sub">Comunidades com pré-requisitos exigem aprovação manual.</p>' +
        reqs.map(req => `
          <div class="item" id="req-${req.id}">
            <div class="head">
              <div>
                <div class="name">${escapeHtml(req.bc_communities?.name || 'Comunidade')}</div>
                <div class="meta">User ID: ${escapeHtml((req.user_id || '').slice(0, 8))}... · ${new Date(req.created_at).toLocaleString('pt-BR')}</div>
              </div>
            </div>
            ${req.answer ? '<div class="answer">' + escapeHtml(req.answer) + '</div>' : '<div class="meta">Sem resposta enviada</div>'}
            <div class="actions">
              <button class="btn-mini btn-approve" onclick="approve('${req.id}')">✓ Aprovar</button>
              <button class="btn-mini btn-reject" onclick="reject('${req.id}')">✗ Rejeitar</button>
            </div>
          </div>
        `).join('') + '</div>'
    }

    window.approve = async function(id) {
      if (!confirm('Aprovar este pedido?')) return
      const r = await fetch('/api/social?action=approve-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
        body: JSON.stringify({ request_id: id })
      })
      if (r.ok) { document.getElementById('req-' + id).remove() }
      else alert('Erro: ' + ((await r.json()).error || ''))
    }

    window.reject = async function(id) {
      const reason = prompt('Razão da rejeição (opcional):')
      const r = await fetch('/api/social?action=reject-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
        body: JSON.stringify({ request_id: id, notes: reason || '' })
      })
      if (r.ok) document.getElementById('req-' + id).remove()
      else alert('Erro')
    }

    async function loadContact(c) {
      let r
      try {
        r = await fetch('/api/admin/contact-messages', { headers: { 'x-admin-secret': getSecret() } })
      } catch (e) {
        c.innerHTML = '<div class="panel"><div class="empty">⚠️ Erro de rede: ' + escapeHtml(e.message) + '</div></div>'
        return
      }

      // Erros HTTP — mensagem clara em vez de cair no fallback de "nenhuma mensagem"
      if (!r.ok) {
        let errMsg = 'Erro carregando mensagens (HTTP ' + r.status + ')'
        if (r.status === 401) {
          errMsg = '🔒 Acesso negado. Confira o admin secret.'
        } else if (r.status === 404) {
          errMsg = 'Endpoint não encontrado. Confirma se /api/admin/contact-messages está deployado no Vercel.'
        } else {
          const d = await r.json().catch(() => ({}))
          if (d.error) errMsg = 'Erro do servidor: ' + escapeHtml(d.error)
        }
        c.innerHTML = '<div class="panel"><div class="empty">' + errMsg + '</div></div>'
        return
      }

      const data = await r.json().catch(() => ({}))
      const msgs = data.messages || []
      if (msgs.length === 0) {
        c.innerHTML = '<div class="panel"><div class="empty">📭 Nenhuma mensagem ainda.<br><br>Quando alguém preencher o form "Manda sua mensagem" no <a href="/" style="color:var(--brand-green);">site</a>, aparece aqui.</div></div>'
        return
      }

      // Templates pre-definidos pra acelerar resposta
      const TEMPLATES = {
        generic:    { label: 'Confirmação genérica',  body: 'Obrigado pelo contato! Recebemos sua mensagem e vamos analisar com calma. Te dou retorno em até 48h úteis.' },
        partnership:{ label: 'Parceria interessada',   body: 'Que ótimo seu interesse em parceria! Vamos sim conversar mais sobre. Você consegue me passar mais detalhes sobre o que tem em mente — modelo de negócio, audiência, e como imagina que faria sentido juntar forças? Posso marcar uma call essa semana se preferir.' },
        business:   { label: 'Listar negócio',         body: 'Adoramos a iniciativa! Pra começar o cadastro do seu negócio, abre essa página: https://brasilconnectusa.com/negocio — preenche o form com os dados (leva 2 min). Nossa equipe analisa e libera em até 48h. Qualquer dúvida me chama por aqui.' },
        investor:   { label: 'Investidor',             body: 'Obrigado pelo interesse em investir no BrasilConnect! Vamos sim conversar com mais profundidade. Pode me mandar uma breve apresentação sua (background, tese de investimento, ticket médio) que monto material apropriado e marco uma call?' },
        bug:        { label: 'Bug reportado',          body: 'Obrigado por reportar! Vou investigar agora e te aviso assim que resolver. Se possível, manda mais detalhes: navegador (Chrome/Safari/Firefox), dispositivo (desktop/celular), e os passos exatos pra reproduzir.' },
        blank:      { label: 'Em branco',              body: '' },
      }

      const fmtDate = (iso) => new Date(iso).toLocaleString('pt-BR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })

      c.innerHTML = '<div class="panel"><div class="panel-eyebrow">FALE CONOSCO</div><h3>' + msgs.length + ' mensagens</h3>' +
        msgs.map(m => {
          const replied = m.status === 'replied'
          const statusBadge = replied
            ? `<span style="background:#DCFCE7;color:#166534;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.05em;">✓ Respondido ${m.replied_at ? '· ' + fmtDate(m.replied_at) : ''}</span>`
            : `<span style="background:#FEF3C7;color:#92400E;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.05em;">Novo</span>`

          return `
          <div class="item" id="msg-${m.id}">
            <div class="head">
              <div style="flex:1;">
                <div class="name">${escapeHtml(m.name)} <span style="font-weight:400;color:var(--ink-muted)">· ${escapeHtml(m.reason)}</span> ${statusBadge}</div>
                <div class="meta">${escapeHtml(m.email)} · ${fmtDate(m.created_at)}</div>
              </div>
            </div>
            <div class="answer">${escapeHtml(m.message)}</div>

            ${replied && m.reply_notes ? `
              <div style="margin-top:10px;padding:10px 12px;background:#F0FDF4;border-left:3px solid #009C3B;border-radius:6px;font-size:13px;color:#14532D;line-height:1.55;">
                <div style="font-size:10px;font-weight:700;color:#166534;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;">Sua resposta</div>
                ${escapeHtml(m.reply_notes).replace(/\n/g,'<br/>')}
              </div>
            ` : ''}

            <div class="actions" style="margin-top:10px;">
              <button class="btn-mini btn-mark" onclick="toggleReply('${m.id}')">${replied ? '↻ Responder de novo' : '✉️ Responder'}</button>
              <a href="mailto:${escapeHtml(m.email)}?subject=Re: BrasilConnect" class="btn-mini" style="text-decoration:none;display:inline-block;background:transparent;border:1px solid var(--line);color:var(--ink-soft);">Cliente de email</a>
            </div>

            <!-- Form de resposta (escondido até clicar) -->
            <div id="reply-${m.id}" style="display:none;margin-top:12px;padding:14px;background:#FAFAFA;border:1px solid var(--line);border-radius:8px;">
              <label style="display:block;font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Template (opcional)</label>
              <select id="tpl-${m.id}" onchange="applyTemplate('${m.id}', this.value)"
                style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--line);background:#fff;font-size:13px;margin-bottom:10px;">
                <option value="">Escolher template…</option>
                ${Object.entries(TEMPLATES).map(([k,t]) => `<option value="${k}">${escapeHtml(t.label)}</option>`).join('')}
              </select>

              <label style="display:block;font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Mensagem</label>
              <textarea id="txt-${m.id}" rows="6" maxlength="10000"
                placeholder="Olá! Obrigado pelo contato..."
                style="width:100%;padding:10px 12px;border-radius:6px;border:1.5px solid var(--line);background:#fff;font-size:14px;font-family:inherit;resize:vertical;box-sizing:border-box;line-height:1.55;"></textarea>
              <div id="cnt-${m.id}" style="text-align:right;font-size:11px;color:#9ca3af;margin-top:4px;">0 / 10.000</div>

              <div style="display:flex;gap:8px;margin-top:10px;align-items:center;">
                <button class="btn-mini btn-approve" onclick="sendReply('${m.id}', '${escapeHtml(m.email)}')" id="snd-${m.id}">Enviar resposta →</button>
                <button class="btn-mini" onclick="toggleReply('${m.id}')" style="background:transparent;border:1px solid var(--line);color:var(--ink-soft);">Cancelar</button>
                <span id="sta-${m.id}" style="font-size:12px;color:var(--ink-muted);margin-left:auto;"></span>
              </div>
            </div>
          </div>
        `}).join('') + '</div>'

      // Wire counter de chars em cada textarea
      msgs.forEach(m => {
        const txt = document.getElementById('txt-' + m.id)
        const cnt = document.getElementById('cnt-' + m.id)
        if (txt && cnt) {
          txt.addEventListener('input', () => {
            const len = txt.value.length
            const ratio = len / 10000
            const color = ratio >= 1 ? '#ef4444' : ratio >= 0.9 ? '#f59e0b' : '#9ca3af'
            cnt.style.color = color
            cnt.textContent = len.toLocaleString('pt-BR') + ' / 10.000'
          })
        }
      })

      // Expoe os templates globalmente pra applyTemplate
      window.__BC_TEMPLATES__ = TEMPLATES
    }

    function toggleReply(id) {
      const box = document.getElementById('reply-' + id)
      if (!box) return
      const isOpen = box.style.display !== 'none'
      box.style.display = isOpen ? 'none' : 'block'
      if (!isOpen) {
        setTimeout(() => document.getElementById('txt-' + id)?.focus(), 50)
      }
    }

    function applyTemplate(id, key) {
      if (!key) return
      const tpl = window.__BC_TEMPLATES__?.[key]
      if (!tpl) return
      const txt = document.getElementById('txt-' + id)
      if (!txt) return
      txt.value = tpl.body
      txt.dispatchEvent(new Event('input'))
      txt.focus()
    }

    async function sendReply(id, email) {
      const txt = document.getElementById('txt-' + id)
      const btn = document.getElementById('snd-' + id)
      const sta = document.getElementById('sta-' + id)
      if (!txt || !btn || !sta) return

      const reply_text = txt.value.trim()
      if (reply_text.length < 5) {
        sta.style.color = '#ef4444'
        sta.textContent = 'Mensagem muito curta'
        return
      }

      btn.disabled = true
      btn.textContent = 'Enviando…'
      sta.style.color = 'var(--ink-muted)'
      sta.textContent = ''

      try {
        const r = await fetch('/api/admin/contact-reply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
          body: JSON.stringify({ message_id: id, reply_text }),
        })
        const data = await r.json().catch(() => ({}))
        if (!r.ok) throw new Error(data.error || 'Falha no envio')

        sta.style.color = '#166534'
        sta.textContent = '✓ Enviado pra ' + email
        btn.textContent = 'Enviado ✓'
        // Recarrega a lista pra mostrar status atualizado
        setTimeout(() => loadContact(document.getElementById('tab-content')), 1500)
      } catch (e) {
        sta.style.color = '#ef4444'
        sta.textContent = '⚠️ ' + e.message
        btn.disabled = false
        btn.textContent = 'Enviar resposta →'
      }
    }

    async function loadReports(c) {
      try {
        const r = await fetch('/api/admin/reports?status=pending', { headers: { 'x-admin-secret': getSecret() } })
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Erro')
        const list = d.reports || []
        if (list.length === 0) {
          c.innerHTML = '<div class="panel"><div class="empty">✅ Nenhuma denúncia pendente.</div></div>'
          return
        }
        c.innerHTML = '<div class="panel"><div class="panel-eyebrow">MODERACAO</div><h3>' + list.length + ' denúncias pendentes</h3>' +
          '<p class="panel-sub">Cada denúncia mostra o que foi reportado e por que. Você decide: dispensar, marcar revisado, ou apagar o conteúdo.</p>' +
          list.map(r => `
            <div class="item">
              <div class="head">
                <div>
                  <div class="name">${escapeHtml(r.target_type)} #${escapeHtml((r.target_id || '').slice(0, 8))}</div>
                  <div class="meta">Motivo: ${escapeHtml(r.reason)} · ${new Date(r.created_at).toLocaleString('pt-BR')}</div>
                </div>
                <span class="badge badge-pending">${escapeHtml(r.status)}</span>

              ${r.details ? '<div class="answer">' + escapeHtml(r.details) + '</div>' : ''}

                <button class="btn-mini btn-mark" onclick="resolveReport('${r.id}', 'reviewed', 'warned', false)">Marcar revisado</button>
                <button class="btn-mini btn-reject" onclick="resolveReport('${r.id}', 'actioned', 'removed_post', true)">Apagar conteúdo</button>
              </div>
            </div>
          `).join('') + '</div>'
      } catch (e) {
        c.innerHTML = '<div class="err-banner">' + escapeHtml(e.message) + '</div>'

    async function resolveReport(id, status, action, deleteTarget) {
      if (deleteTarget && !confirm('Apagar o conteúdo denunciado? Não pode ser desfeito facilmente.')) return
      try {
        const r = await fetch('/api/admin/reports?action=resolve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
          body: JSON.stringify({ report_id: id, status, action_taken: action, delete_target: deleteTarget }),
        })
        if (!r.ok) throw new Error((await r.json()).error || 'Erro')
        loadTab('reports')
      } catch (e) { alert(e.message) }
    }

    // ─── Moderação IA — fila do agente Claude ─────────────────────────
    let _agentFilter = { severity: 'all', category: 'all' }

                ${sv === 'all' ? 'todos' : sv}${s.queue?.[sv]!=null && sv!=='all' ? ' ('+s.queue[sv]+')' : ''}
              </button>`).join('')}
            <span style="color:var(--ink-muted);align-self:center;margin-left:8px;">Categoria:</span>
            ${['all','scam','illegal','spam','toxic'].map(cat => `
              <button class="btn-mini" onclick="_agentFilter.category='${cat}';loadTab('agent')"
                style="background:${_agentFilter.category===cat?'var(--ink)':'var(--paper-soft)'};color:${_agentFilter.category===cat?'#fff':'var(--ink-soft)'};">
                ${cat === 'all' ? 'todas' : (catEmoji[cat]||'') + ' ' + cat}

        const statsBar = `
          <div style="display:flex;gap:14px;flex-wrap:wrap;padding:14px 16px;background:var(--paper-soft);border:1px solid var(--line);border-radius:10px;margin-bottom:14px;font-size:12px;">

            <div><b style="color:#B45309;">${s.queue?.high||0}</b> alto risco</div>
            <div><b style="color:#854D0E;">${s.queue?.medium||0}</b> médio</div>
            <div style="margin-left:auto;color:var(--ink-muted);">

            </div>
          </div>`

        if (items.length === 0) {
          c.innerHTML = `
            <div class="panel">
              <div class="panel-eyebrow">AGENTE IA · CLAUDE HAIKU 4.5</div>
              <h3>Fila de moderação automática</h3>
              <p class="panel-sub">Roda a cada 5 minutos vigiando posts, comments, negócios e bios.</p>
              ${statsBar}
              ${filters}
              <div class="empty">✅ Nada na fila com esse filtro.</div>
            </div>`
          return
        }

        c.innerHTML = `
          <div class="panel">
            <div class="panel-eyebrow">AGENTE IA · CLAUDE HAIKU 4.5</div>
            <h3>${items.length} item${items.length===1?'':'s'} na fila</h3>
            <p class="panel-sub">Cada item foi flagado pelo agente. Aprove (libera), confirme ocultação ou bane o user.</p>
            ${statsBar}
            ${filters}
            ${items.map(it => {
              const sev = it.agent_severity || 'low'
              const cats = it.agent_categories || []
              const hidden = it.agent_status === 'auto_hidden'
              return `

      } catch (e) {
        c.innerHTML = '<div class="err-banner">' + escapeHtml(e.message) + '</div>'
      }

    async function actAgent(target_type, target_id, action) {
      const labels = { approve: 'aprovar e liberar', hide: 'confirmar ocultação', ban_user: 'BANIR o usuário' }
      if (!confirm('Confirmar: ' + labels[action] + '?')) return
      const notes = action === 'ban_user' ? prompt('Motivo do ban (opcional):') : null
      try {
        const r = await fetch('/api/admin/moderation-action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
          body: JSON.stringify({ target_type, target_id, action, admin_notes: notes }),
        })
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Erro')
        loadTab('agent')
      } catch (e) { alert(e.message) }
    }

    // Filtros persistentes da aba Negócios (sobrevivem re-render via dataset do container)
    function setBizFilter(key, value) {
      const c = document.getElementById('tab-content')
      if (value) c.dataset[key] = value
      else delete c.dataset[key]
      loadBusinesses(c)
    }

    // ─── Mensagem livre pro dono do negócio (com template + Resend) ──────
    function toggleBizMsg(id) {
      const box = document.getElementById('bizmsg-' + id)
      if (!box) return
      const isOpen = box.style.display !== 'none'
      box.style.display = isOpen ? 'none' : 'block'
      if (!isOpen) setTimeout(() => document.getElementById('bmtxt-' + id)?.focus(), 50)
    }

    function applyBizTemplate(id, key) {
      if (!key) return
      const body = window.__BIZ_TEMPLATES__?.[key] ?? ''
      const txt = document.getElementById('bmtxt-' + id)
      if (!txt) return
      txt.value = body
      txt.dispatchEvent(new Event('input'))
      txt.focus()
    }

    async function sendBizMsg(id, email) {
      const txt = document.getElementById('bmtxt-' + id)
      const btn = document.getElementById('bmsnd-' + id)
      const sta = document.getElementById('bmsta-' + id)
      if (!txt || !btn || !sta) return

      const msg = txt.value.trim()
      if (msg.length < 5) { sta.style.color = '#ef4444'; sta.textContent = 'Mensagem muito curta'; return }

      btn.disabled = true; btn.textContent = 'Enviando…'
      sta.style.color = 'var(--ink-muted)'; sta.textContent = ''

      try {
        const r = await fetch('/api/admin/business-message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
          body: JSON.stringify({ business_id: id, message: msg }),
        })
        const d = await r.json().catch(() => ({}))
        if (!r.ok) throw new Error(d.error || 'Falha')

        sta.style.color = '#166534'; sta.textContent = '✓ Enviado pra ' + (d.sent_to || email)
        btn.textContent = 'Enviado ✓'
      } catch (e) {
        sta.style.color = '#ef4444'; sta.textContent = '⚠️ ' + e.message
        btn.disabled = false; btn.textContent = 'Enviar mensagem →'
      }
    }

    // Aprovar / rejeitar negócio (com email automático via Resend)
    async function bizAction(id, action) {
      const label = action === 'approve' ? 'aprovar' : 'rejeitar'

      // Pra rejeitar, pede motivo (opcional mas recomendado — vai no email)
      let reason = null
      if (action === 'reject') {
        reason = prompt('Motivo da rejeição (opcional — vai no email pro dono):\n\nEx: "Não conseguimos confirmar o endereço, ou o telefone não atende."', '')
        if (reason === null) return // cancelou
      } else {
        if (!confirm('Aprovar esse negócio? Vamos mandar email automático pro dono confirmando.')) return
      }

      const msg = document.getElementById('msg-biz-' + id)
      const aBtn = document.getElementById('appr-' + id)
      const rBtn = document.getElementById('rej-' + id)
      aBtn.disabled = true; rBtn.disabled = true
      msg.style.color = 'var(--ink-muted)'
      msg.textContent = (action === 'approve' ? 'Aprovando' : 'Rejeitando') + ' + mandando email…'

      try {
        const r = await fetch('/api/admin/business-action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
          body: JSON.stringify({ business_id: id, action, reason: reason || undefined }),
        })
        const d = await r.json().catch(() => ({}))
        if (!r.ok) throw new Error(d.error || 'Erro')

        msg.style.color = action === 'approve' ? '#166534' : '#DC2626'
        const emailNote = d.email_sent ? ' · email enviado pra ' + (d.email_to || 'dono') : ' · email NÃO enviado'
        msg.textContent = (action === 'approve' ? '✓ Aprovado' : '✗ Rejeitado') + emailNote
        // Some o item da lista em 1.8s
        setTimeout(() => {
          const el = document.getElementById('biz-' + id)
          if (el) { el.style.transition = 'opacity 0.3s'; el.style.opacity = '0'; setTimeout(() => loadTab('businesses'), 350) }
        }, 1800)
      } catch (e) {
        msg.style.color = '#DC2626'
        msg.textContent = '⚠️ ' + e.message
        aBtn.disabled = false; rBtn.disabled = false
      }
    }

    async function loadBolao(c) {
      try {
        const r = await fetch('/api/bolao?action=admin-matches', { headers: { 'x-admin-secret': getSecret() } })
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Erro ao carregar partidas')
        const matches = d.matches || []
        if (matches.length === 0) { c.innerHTML = '<div class="panel"><div class="empty">Nenhuma partida cadastrada. Rode supabase/bolao_schema.sql primeiro.</div></div>'; return }
        const finished = matches.filter(m => m.status === 'finished').length
        const upcoming = matches.length - finished
        c.innerHTML = '<div class="panel"><div class="panel-eyebrow">BOLAO COPA 2026</div><h3>' + matches.length + ' partidas (' + finished + ' finalizadas, ' + upcoming + ' pendentes)</h3>' +
          '<p class="panel-sub">Atualize o placar de uma partida e o ranking se ajusta automaticamente.</p>' +
          matches.map(m => `
            <div class="item">
              <div class="head">
                <div>
                  <div class="name">${escapeHtml(m.home_team)} <span style="opacity:.5">vs</span> ${escapeHtml(m.away_team)}</div>
                  <div class="meta">${escapeHtml(m.phase || '')}${m.group_name ? ' / Grupo ' + m.group_name : ''} · ${new Date(m.match_date).toLocaleString('pt-BR')} · ${m.predictions_count} palpites</div>
                </div>
                <span class="badge badge-${m.status === 'finished' ? 'done' : 'pending'}">${m.status}</span>
              </div>
              <div style="display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;">
                <input id="hs-${m.id}" type="number" min="0" max="50" value="${m.home_score ?? ''}" placeholder="${m.home_team.slice(0,3)}" style="width:72px;padding:8px;border:1px solid var(--line);border-radius:6px;font-size:14px;text-align:center;" />
                <span style="font-weight:700;color:var(--ink-muted);">x</span>
                <input id="as-${m.id}" type="number" min="0" max="50" value="${m.away_score ?? ''}" placeholder="${m.away_team.slice(0,3)}" style="width:72px;padding:8px;border:1px solid var(--line);border-radius:6px;font-size:14px;text-align:center;" />
                <button class="btn-mini btn-mark" onclick="setBolaoResult(${m.id})">Salvar placar</button>
                <span id="msg-${m.id}" style="font-size:12px;color:var(--ink-muted);"></span>
              </div>
            </div>
          `).join('') + '</div>'
      } catch (e) {
        c.innerHTML = '<div class="err-banner">' + escapeHtml(e.message) + '</div>'
      }
    }

    async function setBolaoResult(matchId) {
      const h = document.getElementById('hs-' + matchId).value
      const a = document.getElementById('as-' + matchId).value
      const msg = document.getElementById('msg-' + matchId)
      if (h === '' || a === '') { msg.style.color = '#dc2626'; msg.textContent = 'Preencha os 2 placares'; return }
      msg.style.color = 'var(--ink-muted)'; msg.textContent = 'Salvando...'
      try {
        const r = await fetch('/api/bolao?action=set-result', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
          body: JSON.stringify({ match_id: matchId, home_score: Number(h), away_score: Number(a) }),
        })
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Erro')
        msg.style.color = '#16a34a'; msg.textContent = 'OK · ' + d.message
        setTimeout(() => loadTab('bolao'), 1200)
      } catch (e) {
        msg.style.color = '#dc2626'; msg.textContent = e.message
      }
    }

    // ─── Pedidos Restaurante (global, todos os negócios) ──────────────────
    async function loadRestaurantOrders(c) {
      const days = c.dataset.days || '30'
      const statusFilter = c.dataset.status || ''
      const url = '/api/admin/restaurant-orders?days=' + days + (statusFilter ? '&status=' + statusFilter : '')

      let r
      try { r = await fetch(url, { headers: { 'x-admin-secret': getSecret() } }) }
      catch (e) { c.innerHTML = '<div class="panel"><div class="empty">⚠️ Erro de rede: ' + escapeHtml(e.message) + '</div></div>'; return }

      if (!r.ok) {
        const d = await r.json().catch(() => ({}))
        c.innerHTML = '<div class="panel"><div class="empty">Erro: ' + escapeHtml(d.error || ('HTTP ' + r.status)) + '</div></div>'
        return
      }

      const data = await r.json().catch(() => ({}))
      const orders = data.orders || []
      const s = data.summary || {}

      const fmtMoney = (cents) => 'US$ ' + ((cents || 0) / 100).toFixed(2)
      const fmtDate  = (iso) => new Date(iso).toLocaleString('pt-BR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })

      const statusBadge = (st) => {
        const map = {
          pending:   { bg: '#FEF3C7', fg: '#92400E', label: 'Pendente' },
          confirmed: { bg: '#DBEAFE', fg: '#1E40AF', label: 'Confirmado' },
          preparing: { bg: '#FED7AA', fg: '#9A3412', label: 'Preparando' },
          ready:     { bg: '#A7F3D0', fg: '#065F46', label: 'Pronto' },
          delivered: { bg: '#DCFCE7', fg: '#166534', label: 'Entregue' },
          canceled:  { bg: '#FEE2E2', fg: '#991B1B', label: 'Cancelado' },
        }
        const m = map[st] || { bg: '#F3F4F6', fg: '#6B7280', label: st || '—' }
        return `<span style="background:${m.bg};color:${m.fg};font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.05em;">${m.label}</span>`
      }

      const payBadge = (ps) => {
        if (ps === 'paid')     return `<span style="color:#166534;font-size:11px;font-weight:600;">✓ Pago</span>`
        if (ps === 'refunded') return `<span style="color:#9A3412;font-size:11px;font-weight:600;">↩ Reembolsado</span>`
        if (ps === 'failed')   return `<span style="color:#991B1B;font-size:11px;font-weight:600;">✗ Falhou</span>`
        return `<span style="color:#9CA3AF;font-size:11px;">Não pago</span>`
      }

      c.innerHTML = `
        <!-- Métricas summary -->
        <div class="panel" style="padding:20px;">
          <div class="panel-eyebrow">RESUMO · últimos ${s.window_days || days} dias</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-top:14px;">
            <div style="background:var(--paper-soft);border-radius:10px;padding:14px;">
              <div style="font-size:11px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;">Hoje</div>
              <div style="font-size:24px;font-weight:800;color:var(--ink);margin-top:4px;">${s.orders_today || 0}</div>
              <div style="font-size:11px;color:var(--ink-muted);margin-top:2px;">pedidos</div>
            </div>
            <div style="background:var(--paper-soft);border-radius:10px;padding:14px;">
              <div style="font-size:11px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;">7 dias</div>
              <div style="font-size:24px;font-weight:800;color:var(--ink);margin-top:4px;">${s.orders_week || 0}</div>
              <div style="font-size:11px;color:var(--ink-muted);margin-top:2px;">pedidos</div>
            </div>
            <div style="background:#F0FDF4;border-radius:10px;padding:14px;border:1px solid #86EFAC;">
              <div style="font-size:11px;color:#166534;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;">GMV (pagos)</div>
              <div style="font-size:24px;font-weight:800;color:#14532D;margin-top:4px;">${fmtMoney(s.total_gmv_cents)}</div>
              <div style="font-size:11px;color:#166534;margin-top:2px;">volume bruto</div>
            </div>
            <div style="background:#FEFCE8;border-radius:10px;padding:14px;border:1px solid #FDE047;">
              <div style="font-size:11px;color:#854D0E;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;">💰 Nossa parte</div>
              <div style="font-size:24px;font-weight:800;color:#713F12;margin-top:4px;">${fmtMoney(s.platform_revenue_cents)}</div>
              <div style="font-size:11px;color:#854D0E;margin-top:2px;">platform fee</div>
            </div>
          </div>
          <div style="display:flex;gap:14px;margin-top:14px;font-size:12px;color:var(--ink-soft);flex-wrap:wrap;">
            <span>📋 Pendentes: <strong>${s.pending_count || 0}</strong></span>
            <span>🔥 Preparando: <strong>${s.preparing_count || 0}</strong></span>
            <span>✅ Entregues: <strong>${s.delivered_count || 0}</strong></span>
            <span>❌ Cancelados: <strong>${s.canceled_count || 0}</strong></span>
          </div>
        </div>

        <!-- Filtros -->
        <div style="display:flex;gap:8px;align-items:center;margin:14px 0;flex-wrap:wrap;">
          <label style="font-size:12px;color:var(--ink-muted);">Janela:</label>
          <select onchange="setRestaurantFilter('days', this.value)" style="padding:6px 10px;border-radius:6px;border:1px solid var(--line);font-size:13px;background:#fff;">
            <option value="1"   ${days==='1' ?'selected':''}>Hoje</option>
            <option value="7"   ${days==='7' ?'selected':''}>7 dias</option>
            <option value="30"  ${days==='30'?'selected':''}>30 dias</option>
            <option value="90"  ${days==='90'?'selected':''}>90 dias</option>
            <option value="365" ${days==='365'?'selected':''}>1 ano</option>
          </select>
          <label style="font-size:12px;color:var(--ink-muted);margin-left:8px;">Status:</label>
          <select onchange="setRestaurantFilter('status', this.value)" style="padding:6px 10px;border-radius:6px;border:1px solid var(--line);font-size:13px;background:#fff;">
            <option value=""           ${statusFilter===''         ?'selected':''}>Todos</option>
            <option value="pending"    ${statusFilter==='pending'  ?'selected':''}>Pendentes</option>
            <option value="confirmed"  ${statusFilter==='confirmed'?'selected':''}>Confirmados</option>
            <option value="preparing"  ${statusFilter==='preparing'?'selected':''}>Preparando</option>
            <option value="ready"      ${statusFilter==='ready'    ?'selected':''}>Prontos</option>
            <option value="delivered"  ${statusFilter==='delivered'?'selected':''}>Entregues</option>
            <option value="canceled"   ${statusFilter==='canceled' ?'selected':''}>Cancelados</option>
          </select>
          <span style="margin-left:auto;font-size:12px;color:var(--ink-muted);">${orders.length} pedidos</span>
        </div>

        <!-- Lista -->
        <div class="panel" style="padding:0;">
          ${orders.length === 0 ? `
            <div class="empty" style="padding:40px;text-align:center;">
              📭 Nenhum pedido nesse período.<br><br>
              Quando algum negócio com Stripe Connect ativo receber pedido via <code>/negocio/&lt;slug&gt;/cardapio</code>, aparece aqui.
            </div>
          ` : `
            <table style="width:100%;border-collapse:collapse;font-size:13px;">
              <thead>
                <tr style="background:var(--paper-soft);border-bottom:1px solid var(--line);">
                  <th style="text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">#</th>
                  <th style="text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">Restaurante</th>
                  <th style="text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">Cliente</th>
                  <th style="text-align:right;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">Total</th>
                  <th style="text-align:right;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">Nossa</th>
                  <th style="text-align:center;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">Status</th>
                  <th style="text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">Quando</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${orders.map(o => `
                  <tr style="border-bottom:1px solid var(--line);">
                    <td style="padding:10px 14px;font-weight:700;color:var(--ink);">#${o.order_number}</td>
                    <td style="padding:10px 14px;">
                      <div style="font-weight:600;">${escapeHtml(o.bc_businesses?.name || '—')}</div>
                      <div style="font-size:11px;color:var(--ink-muted);">${escapeHtml(o.bc_businesses?.city || '')}, ${escapeHtml(o.bc_businesses?.state || '')}</div>
                    </td>
                    <td style="padding:10px 14px;">
                      <div>${escapeHtml(o.customer_name || '—')}</div>
                      <div style="font-size:11px;color:var(--ink-muted);">${escapeHtml(o.customer_email)}</div>
                    </td>
                    <td style="padding:10px 14px;text-align:right;font-weight:600;">${fmtMoney(o.total_cents)}</td>
                    <td style="padding:10px 14px;text-align:right;color:#854D0E;font-weight:600;">${fmtMoney(o.platform_fee_cents)}</td>
                    <td style="padding:10px 14px;text-align:center;">
                      ${statusBadge(o.status)}<br>
                      <div style="margin-top:3px;">${payBadge(o.payment_status)}</div>
                    </td>
                    <td style="padding:10px 14px;font-size:12px;color:var(--ink-muted);">${fmtDate(o.created_at)}</td>
                    <td style="padding:10px 14px;">
                      <a href="/pedido/${o.id}" target="_blank" class="btn-mini" style="text-decoration:none;font-size:11px;padding:4px 8px;">Ver →</a>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `}
        </div>
      `
    }

    function setRestaurantFilter(key, value) {
      const c = document.getElementById('tab-content')
      if (value) c.dataset[key] = value
      else delete c.dataset[key]
      loadRestaurantOrders(c)
    }

    // ═════════════════════════════════════════════════════════════════════
    // TAB USUÁRIOS — listagem, drawer 360°, edit, ban, role, email
    // ═════════════════════════════════════════════════════════════════════
    const _userState = {
      list: [],
      selected: new Set(),
      filter: { q: '', state: '', role: '', onboarded: '', banned: '', has_business: '' },
      summary: null,
      current: null, // detalhe do user aberto no drawer
    }

    const _fmt = (iso) => iso ? new Date(iso).toLocaleString('pt-BR', { day:'2-digit', month:'short', year:'2-digit', hour:'2-digit', minute:'2-digit' }) : '—'
    const _fmtD = (iso) => iso ? new Date(iso).toLocaleDateString('pt-BR') : '—'

    async function loadUsers(c) {
      const f = _userState.filter
      const qs = new URLSearchParams()
      if (f.q)            qs.set('q', f.q)
      if (f.state)        qs.set('state', f.state)
      if (f.role)         qs.set('role', f.role)
      if (f.onboarded)    qs.set('onboarded', f.onboarded)
      if (f.banned)       qs.set('banned', f.banned)
      if (f.has_business) qs.set('has_business', f.has_business)

      const r = await fetch('/api/admin/users-list?' + qs.toString(), { headers: { 'x-admin-secret': getSecret() } })
      if (!r.ok) {
        const d = await r.json().catch(() => ({}))
        c.innerHTML = '<div class="err-banner">Erro: ' + escapeHtml(d.error || ('HTTP ' + r.status)) + '</div>'
        return
      }
      const data = await r.json()
      _userState.list = data.users || []
      _userState.summary = data.summary || {}

      const s = _userState.summary
      const summary = `
        <div class="users-summary">
          <span><b>${s.total ?? 0}</b> total</span>
          <span><b>${s.onboarded ?? 0}</b> onboarded</span>
          <span><b>${s.not_onboarded ?? 0}</b> sem onboarding</span>
          <span><b>${s.banned ?? 0}</b> banidos</span>
          <span><b>${s.created_today ?? 0}</b> hoje</span>
          <span><b>${s.created_week ?? 0}</b> últimos 7d</span>
        </div>
      `

      const toolbar = `
        <div class="users-toolbar">
          <input id="u-q" placeholder="Buscar email, nome, cidade…" value="${escapeHtml(f.q)}" />
          <select id="u-state">
            <option value="">Todos estados</option>
            ${['FL','TX','MA','NJ','NY','CA','GA','PA','CT','NC','VA','MD','IL','AZ','CO','WA'].map(s2 => `<option value="${s2}" ${f.state===s2?'selected':''}>${s2}</option>`).join('')}
          </select>
          <select id="u-onb">
            <option value="">Onboarding: todos</option>
            <option value="true"  ${f.onboarded==='true'?'selected':''}>Completou</option>
            <option value="false" ${f.onboarded==='false'?'selected':''}>Não completou</option>
          </select>
          <select id="u-ban">
            <option value="">Status: todos</option>
            <option value="false" ${f.banned==='false'?'selected':''}>Ativos</option>
            <option value="true"  ${f.banned==='true'?'selected':''}>Banidos</option>
          </select>
          <select id="u-biz">
            <option value="">Negócios: todos</option>
            <option value="true"  ${f.has_business==='true'?'selected':''}>Tem negócio</option>
            <option value="false" ${f.has_business==='false'?'selected':''}>Sem negócio</option>
          </select>
          <select id="u-role">
            <option value="">Role: todos</option>
            ${['user','moderator','admin','partner','business'].map(r2 => `<option value="${r2}" ${f.role===r2?'selected':''}>${r2}</option>`).join('')}
          </select>
          <button class="btn-mini btn-mark" onclick="applyUserFilter()">Filtrar</button>
          <span class="filter-pill">${_userState.list.length} mostrados</span>
        </div>
      `

      const bulk = `
        <div class="bulk-bar ${_userState.selected.size > 0 ? 'active' : ''}" id="u-bulk-bar">
          <span><b id="u-bulk-count">${_userState.selected.size}</b> usuário(s) selecionado(s)</span>
          <button onclick="openEmailComposer('bulk')">✉️ Enviar email</button>
          <button onclick="clearUserSelection()" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.3);">Limpar</button>
        </div>
      `

      const rows = _userState.list.map(u => {
        const checked = _userState.selected.has(u.user_id) ? 'checked' : ''
        const av = u.avatar_url
          ? `<img class="avatar" src="${escapeHtml(u.avatar_url)}" alt=""/>`
          : `<span class="avatar"></span>`
        const name = u.full_name || u.display_name || '(sem nome)'
        const badges = [
          u.onboarding_completed ? '<span class="badge b-onb">✓ onb</span>' : '<span class="badge b-noonb">pend</span>',
          u.banned ? '<span class="badge b-ban">banido</span>' : '',
          u.businesses_count > 0 ? `<span class="badge b-biz">${u.businesses_count} biz</span>` : '',
          u.role ? `<span class="badge b-role">${escapeHtml(u.role)}</span>` : '',
        ].join('')
        return `
          <tr onclick="onUserRowClick(event, '${u.user_id}')">
            <td onclick="event.stopPropagation()" style="width:34px;">
              <input type="checkbox" ${checked} onchange="toggleUserSel('${u.user_id}', this.checked)" />
            </td>
            <td>${av}<b>${escapeHtml(name)}</b><div style="font-size:11px;color:var(--ink-muted);margin-left:42px;margin-top:-2px;">${escapeHtml(u.email || '')}</div></td>
            <td>${escapeHtml((u.city || '') + (u.state ? ' / ' + u.state : ''))}</td>
            <td>${badges}</td>
            <td style="font-size:11px;color:var(--ink-muted);">${_fmtD(u.created_at)}</td>
            <td style="font-size:11px;color:var(--ink-muted);">${_fmt(u.last_sign_in_at)}</td>
            <td><button class="btn-mini btn-mark" onclick="event.stopPropagation();openUserDetail('${u.user_id}')">Detalhes →</button></td>
          </tr>
        `
      }).join('')

      const table = _userState.list.length === 0
        ? '<div class="empty">Nenhum usuário encontrado com esses filtros.</div>'
        : `<table class="users-table">
            <thead>
              <tr>
                <th><input type="checkbox" onchange="toggleAllUsers(this.checked)" ${_userState.selected.size === _userState.list.length && _userState.list.length > 0 ? 'checked' : ''} /></th>
                <th>Usuário</th>
                <th>Local</th>
                <th>Status</th>
                <th>Criado</th>
                <th>Último login</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`

      c.innerHTML = '<div class="panel"><div class="panel-eyebrow">USUÁRIOS DA PLATAFORMA</div><h3>Gerenciar usuários</h3>' +
        summary + toolbar + bulk + table + '</div>' +
        renderDrawer() + renderEmailModal()

      // Wire enter no search
      document.getElementById('u-q').addEventListener('keydown', e => { if (e.key === 'Enter') applyUserFilter() })
    }

    window.applyUserFilter = function() {
      _userState.filter = {
        q:            document.getElementById('u-q').value.trim(),
        state:        document.getElementById('u-state').value,
        role:         document.getElementById('u-role').value,
        onboarded:    document.getElementById('u-onb').value,
        banned:       document.getElementById('u-ban').value,
        has_business: document.getElementById('u-biz').value,
      }
      _userState.selected.clear()
      loadUsers(document.getElementById('tab-content'))
    }

    window.toggleUserSel = function(id, checked) {
      if (checked) _userState.selected.add(id)
      else _userState.selected.delete(id)
      const bar = document.getElementById('u-bulk-bar')
      const cnt = document.getElementById('u-bulk-count')
      if (cnt) cnt.textContent = _userState.selected.size
      if (bar) bar.classList.toggle('active', _userState.selected.size > 0)
    }

    window.toggleAllUsers = function(checked) {
      if (checked) _userState.list.forEach(u => _userState.selected.add(u.user_id))
      else _userState.selected.clear()
      loadUsers(document.getElementById('tab-content'))
    }

    window.clearUserSelection = function() {
      _userState.selected.clear()
      loadUsers(document.getElementById('tab-content'))
    }

    window.onUserRowClick = function(ev, id) {
      // Clique na linha (fora do checkbox/botão) abre detalhe
      openUserDetail(id)
    }

    // ───── Drawer ─────────────────────────────────────────────────────
    function renderDrawer() {
      return `
        <div class="drawer-overlay" id="drawer-ov" onclick="closeDrawer()"></div>
        <div class="drawer" id="drawer">
          <div class="drawer-head">
            <div>
              <div style="font-size:11px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.12em;">Detalhe do usuário</div>
              <div id="dw-name" style="font-family:var(--font-display);font-size:18px;font-weight:600;margin-top:2px;">—</div>
            </div>
            <button class="x" onclick="closeDrawer()">×</button>
          </div>
          <div class="drawer-body" id="dw-body"><p class="muted">Carregando…</p></div>
        </div>
      `
    }

    window.closeDrawer = function() {
      document.getElementById('drawer')?.classList.remove('open')
      document.getElementById('drawer-ov')?.classList.remove('open')
      _userState.current = null
    }

    window.openUserDetail = async function(user_id) {
      const dw = document.getElementById('drawer')
      const ov = document.getElementById('drawer-ov')
      const body = document.getElementById('dw-body')
      const name = document.getElementById('dw-name')
      if (!dw || !body) return
      dw.classList.add('open')
      ov.classList.add('open')
      body.innerHTML = '<p class="muted">Carregando…</p>'
      name.textContent = 'Carregando…'

      const r = await fetch('/api/admin/user-detail?user_id=' + encodeURIComponent(user_id), {
        headers: { 'x-admin-secret': getSecret() }
      })
      if (!r.ok) {
        const d = await r.json().catch(() => ({}))
        body.innerHTML = '<div class="err-banner">' + escapeHtml(d.error || 'Erro') + '</div>'
        return
      }
      const data = await r.json()
      _userState.current = data
      const p = data.profile || {}
      name.textContent = p.full_name || p.display_name || p.email || user_id.slice(0, 8)
      body.innerHTML = renderUserDetail(data)
    }

    function renderUserDetail(d) {
      const p = d.profile || {}
      const a = d.auth || {}
      const ban = d.banned

      const sec = (title, html) => `<div class="drawer-section"><h4>${title}</h4>${html}</div>`

      // ── Ações ───────────────────────────────────────────────
      const actions = `
        <div class="drawer-actions">
          <button class="primary" onclick="openEmailComposer('single')">✉️ Enviar email</button>
          ${ban
            ? `<button class="danger" onclick="userAction('unban')">Desbanir</button>`
            : `<button class="danger" onclick="userAction('ban')">Banir</button>`}
          <button onclick="userAction('reset_onboarding')">Resetar onboarding</button>
          <button onclick="userAction('set_role')">Mudar role…</button>
          <button onclick="userAction('update_auth_email')">Mudar email…</button>
          <button class="danger" onclick="userAction('delete')" style="margin-left:auto;">🗑 Deletar usuário</button>
        </div>
      `

      // ── Perfil (form editável) ─────────────────────────────
      const editable = `
        <form id="dw-edit" onsubmit="saveUserProfile(event)" class="edit-grid">
          <label>Nome completo<input name="full_name" value="${escapeHtml(p.full_name || '')}" /></label>
          <label>Display name<input name="display_name" value="${escapeHtml(p.display_name || '')}" /></label>
          <label>Cidade<input name="city" value="${escapeHtml(p.city || '')}" /></label>
          <label>Estado<input name="state" value="${escapeHtml(p.state || '')}" maxlength="2" /></label>
          <label>WhatsApp<input name="whatsapp" value="${escapeHtml(p.whatsapp || '')}" /></label>
          <label>Instagram<input name="instagram" value="${escapeHtml(p.instagram || '')}" /></label>
          <label>Avatar URL<input name="avatar_url" value="${escapeHtml(p.avatar_url || '')}" /></label>
          <label>Country<input name="country" value="${escapeHtml(p.country || 'USA')}" /></label>
          <label class="span2">Bio<textarea name="bio">${escapeHtml(p.bio || '')}</textarea></label>
          <label>Interesses (vírgula)<input name="interests" value="${escapeHtml((p.interests || []).join(', '))}" /></label>
          <label>Role
            <select name="role">
              ${['','user','moderator','admin','partner','business'].map(r2 => `<option value="${r2}" ${(p.role||'')===r2?'selected':''}>${r2 || '(sem role)'}</option>`).join('')}
            </select>
          </label>

    // ───── Mutations ─────────────────────────────────────────────────
    window.saveUserProfile = async function(ev) {
      ev.preventDefault()
      const form = ev.target
      const fd = new FormData(form)
      const patch = {}
      for (const [k, v] of fd.entries()) {
        if (k === 'interests') patch[k] = v.split(',').map(s => s.trim()).filter(Boolean)
        else if (k === 'state') patch[k] = (v || '').toUpperCase().slice(0, 2)
        else patch[k] = v
      }
      const sta = document.getElementById('dw-edit-status')
      sta.textContent = 'Salvando…'
      const r = await fetch('/api/admin/user-action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
        body: JSON.stringify({ user_id: _userState.current.user_id, action: 'update_profile', patch })
      })
      const d = await r.json()
      if (!r.ok) { sta.style.color = '#ef4444'; sta.textContent = 'Erro: ' + (d.error || ''); return }
      sta.style.color = '#16a34a'; sta.textContent = '✓ Salvo'
      openUserDetail(_userState.current.user_id) // recarrega drawer
      loadUsers(document.getElementById('tab-content')) // recarrega lista
    }

    window.userAction = async function(action) {
      const uid = _userState.current?.user_id
      if (!uid) return
      let payload = { user_id: uid, action }

      if (action === 'ban') {
        const reason = prompt('Motivo do ban:')
        if (!reason) return
        const exp = prompt('Expira em (YYYY-MM-DD, vazio = permanente):')
        payload.reason = reason
        payload.expires_at = exp ? new Date(exp + 'T00:00:00Z').toISOString() : null
      } else if (action === 'unban') {
        if (!confirm('Desbanir esse usuário?')) return
      } else if (action === 'reset_onboarding') {
        if (!confirm('Resetar onboarding (apaga checklist também)?')) return
      } else if (action === 'set_role') {
        const role = prompt('Novo role (user, moderator, admin, partner, business, vazio = nenhum):')
        if (role === null) return
        payload.role = role.trim()
      } else if (action === 'update_auth_email') {
        const new_email = prompt('Novo email (auth + profile):', _userState.current.profile?.email || '')
        if (!new_email) return
        payload.new_email = new_email.trim()
      } else if (action === 'delete') {
        const email = _userState.current.profile?.email || ''
        if (!email) { alert('Sem email no profile — delete não suportado por este caminho.'); return }
        const c1 = confirm(`Deletar PERMANENTEMENTE ${email}?\n\nApaga: profile, posts, comentários, comunidades, pedidos, notificações.\nBloqueia se tiver negócios ativos.\n\nIRREVERSÍVEL.`)
        if (!c1) return
        const typed = prompt(`Para confirmar, digite o email completo:\n${email}`)
        if (!typed || typed.trim().toLowerCase() !== email.toLowerCase()) {
          alert('Email não confere. Operação cancelada.')
          return
        }
        payload.confirm_email = typed.trim()
      }

      const r = await fetch('/api/admin/user-action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
        body: JSON.stringify(payload)
      })
      const d = await r.json()
      if (!r.ok) {
        // Erro de delete com businesses bloqueando: lista os nomes pra ajudar o admin
        if (action === 'delete' && d.businesses?.length) {
          alert('Erro: ' + d.error + '\n\nNegócios: ' + d.businesses.map(b => b.name).join(', '))
        } else {
          alert('Erro: ' + (d.error || ''))
        }
        return
      }
      if (action === 'delete') {
        // Drawer não pode mais carregar (user não existe). Fecha e recarrega lista.
        closeDrawer()
        loadUsers(document.getElementById('tab-content'))
        return
      }
      openUserDetail(uid)
      loadUsers(document.getElementById('tab-content'))
    }

    window.closeEmailModal = function() {
      document.getElementById('email-ov')?.classList.remove('open')
    }

    window.openEmailComposer = function(mode) {
      const ov = document.getElementById('email-ov')
      const title = document.getElementById('em-title')
      const sub = document.getElementById('em-sub')
      const btn = document.getElementById('em-send')
      if (!ov) return
      document.getElementById('em-subject').value = ''
      document.getElementById('em-body').value = ''
      document.getElementById('em-status').textContent = ''
      document.getElementById('em-status').style.color = 'var(--ink-muted)'

      if (mode === 'single') {
        const cur = _userState.current
        if (!cur) return
        const email = cur.profile?.email || cur.auth?.email
        title.textContent = 'Enviar email para 1 usuário'
        sub.textContent = email ? `→ ${email}` : '(sem email)'
        btn.onclick = () => sendUserEmail({ user_id: cur.user_id })
      } else {
        const n = _userState.selected.size
        if (n === 0) { alert('Selecione pelo menos 1 usuário na lista.'); return }
        title.textContent = `Enviar email em massa`
        sub.textContent = `→ ${n} usuário(s) selecionado(s)`
        btn.onclick = () => sendUserEmail({ user_ids: [..._userState.selected] })
      }
      ov.classList.add('open')
      setTimeout(() => document.getElementById('em-subject').focus(), 60)
    }

    async function sendUserEmail(target) {
      const subject = document.getElementById('em-subject').value.trim()
      const body    = document.getElementById('em-body').value.trim()
      const sta     = document.getElementById('em-status')
      const btn     = document.getElementById('em-send')
      if (subject.length < 2) { sta.style.color = '#ef4444'; sta.textContent = 'Assunto muito curto'; return }
      if (body.length < 5)    { sta.style.color = '#ef4444'; sta.textContent = 'Corpo muito curto'; return }

      btn.disabled = true
      btn.textContent = 'Enviando…'
      sta.style.color = 'var(--ink-muted)'
      sta.textContent = 'Enviando…'

      try {
        const r = await fetch('/api/admin/user-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
          body: JSON.stringify({ ...target, subject, body })
        })
        const d = await r.json()
        if (!r.ok) { sta.style.color = '#ef4444'; sta.textContent = 'Erro: ' + (d.error || ''); btn.disabled = false; btn.textContent = 'Enviar →'; return }
        sta.style.color = '#16a34a'
        sta.textContent = `✓ ${d.sent} enviado(s)${d.failed ? ', ' + d.failed + ' falha(s)' : ''}`
        btn.textContent = '✓ Enviado'
        setTimeout(() => { closeEmailModal(); btn.disabled = false; btn.textContent = 'Enviar →' }, 1400)
      } catch (e) {
        sta.style.color = '#ef4444'; sta.textContent = 'Erro de rede: ' + e.message
        btn.disabled = false; btn.textContent = 'Enviar →'
      }
    }
