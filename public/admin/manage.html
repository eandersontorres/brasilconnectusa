<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin · Gerenciar · BrasilConnect USA</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/premium.css">
  <style>
    body { background: var(--paper); }
    .admin-topbar { background: var(--paper-elevated); border-bottom: 1px solid var(--line); padding: 18px 24px; }
    .admin-topbar .brand { display: flex; align-items: center; gap: 14px; max-width: 1400px; margin: 0 auto; flex-wrap: wrap; }
    .admin-topbar .nav-links { display: flex; gap: 14px; margin-left: 8px; flex-wrap: wrap; }
    .admin-topbar .nav-links a { font-size: 13px; color: var(--ink-soft); text-decoration: none; }
    .admin-topbar .nav-links a.active { color: var(--brand-green); font-weight: 600; }
    .admin-topbar .meta { margin-left: auto; font-size: 13px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; }

    .admin-container { max-width: 1200px; margin: 24px auto; padding: 0 24px; }

    .tabs-row { display: flex; gap: 4px; background: var(--paper-soft); border-radius: 10px; padding: 4px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 10px 14px; border: none; background: transparent; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; border-radius: 8px; color: var(--ink-muted); }
    .tab-btn.active { background: var(--paper-elevated); color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,.08); }

    .panel { background: var(--paper-elevated); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 24px 28px; margin-bottom: 18px; }
    .panel h3 { font-family: var(--font-display); margin: 0 0 6px 0; color: var(--ink); font-size: 1.2rem; font-weight: 600; }
    .panel-eyebrow { text-transform: uppercase; letter-spacing: 0.18em; font-size: 10px; font-weight: 600; color: var(--brand-gold-dark); margin-bottom: 6px; }
    .panel-sub { color: var(--ink-muted); font-size: 13px; margin: 0 0 16px 0; }

    .item { padding: 14px 16px; border: 1px solid var(--line); border-radius: var(--r-md); margin-bottom: 8px; }
    .item .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; flex-wrap: wrap; gap: 8px; }
    .item .name { font-weight: 700; color: var(--ink); font-size: 14px; }
    .item .meta { font-size: 11px; color: var(--ink-muted); }
    .item .answer { font-size: 13px; color: var(--ink-soft); padding: 8px 10px; background: var(--paper); border-radius: 6px; margin: 8px 0; line-height: 1.5; }
    .item .actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn-mini { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; }
    .btn-approve { background: #10B981; color: #fff; }
    .btn-reject  { background: #EF4444; color: #fff; }
    .btn-mark    { background: var(--ink); color: var(--paper); }

    .login-card { max-width: 380px; margin: 80px auto; background: var(--paper-elevated); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 36px 28px; text-align: center; }
    .login-card .eyebrow { text-transform: uppercase; letter-spacing: 0.18em; font-size: 11px; font-weight: 600; color: var(--brand-gold-dark); margin-bottom: 12px; }
    .login-card h2 { font-family: var(--font-display); font-size: 1.6rem; font-weight: 600; margin: 0 0 8px 0; }
    .login-card input { width: 100%; padding: 12px 14px; font-size: 14px; border: 1px solid var(--line); border-radius: var(--r-md); margin-bottom: 12px; box-sizing: border-box; font-family: inherit; outline: none; background: var(--paper); }
    .err-banner { background: #FBE9E7; color: #802020; border: 1px solid #E8C2BC; padding: 10px 14px; border-radius: var(--r-sm); font-size: 13px; margin-bottom: 14px; text-align: left; }
    .empty { padding: 32px; text-align: center; color: var(--ink-muted); font-style: italic; font-size: 13px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const STORAGE_KEY = 'bc_admin_secret'
    const root = document.getElementById('app')
    const getSecret = () => { try { return sessionStorage.getItem(STORAGE_KEY) || '' } catch (e) { return '' } }
    const setSecret = s => { try { sessionStorage.setItem(STORAGE_KEY, s) } catch (e) {} }
    const clearSecret = () => { try { sessionStorage.removeItem(STORAGE_KEY) } catch (e) {} }
    const escapeHtml = s => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))

    let currentTab = 'requests'

    function topbar(active) {
      return `
        <div class="admin-topbar">
          <div class="brand">
            <a href="/admin" style="text-decoration:none;font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:600;color:var(--brand-navy);letter-spacing:-0.01em;"><span>Brasil</span><em style="color:var(--brand-gold);font-style:normal;font-weight:600;">Connect</em></a>
            <div class="nav-links">
              <a href="/admin/mindmap">Mind Map</a>
              <a href="/admin/manage" class="active">Gerenciar</a>
              <a href="/admin/waitlist">Lista de espera</a>
              <a href="/admin/analytics">Analytics</a>
              <a href="/admin/utm-builder">UTM Builder</a>
              <a href="/admin/roadmap">Roadmap</a>
              <a href="/admin/parceiros">Parceiros</a>
            </div>
            <div class="meta">Admin Console</div>
          </div>
        </div>
      `
    }

    function renderLogin(errMsg) {
      root.innerHTML = topbar() + `
        <div class="login-card">
          <div class="eyebrow">ACESSO RESTRITO</div>
          <h2>Gerenciar plataforma</h2>
          <p class="muted">Aprove pedidos de comunidades restritas, leia mensagens, gerencie negócios.</p>
          ${errMsg ? `<div class="err-banner">${escapeHtml(errMsg)}</div>` : ''}
          <input id="secret" type="password" placeholder="ADMIN_SECRET" autocomplete="off" />
          <button class="btn btn-primary" id="loginBtn" style="width:100%;">Entrar</button>
        </div>
      `
      document.getElementById('loginBtn').onclick = doLogin
      document.getElementById('secret').onkeydown = e => { if (e.key === 'Enter') doLogin() }
      setTimeout(() => document.getElementById('secret').focus(), 80)
    }

    async function doLogin() {
      const v = document.getElementById('secret').value.trim()
      if (!v) return
      try {
        const r = await fetch('/api/admin/analytics', { headers: { 'x-admin-secret': v } })
        if (r.status === 401) return renderLogin('Senha incorreta')
        setSecret(v)
        renderDashboard()
      } catch (e) {
        setSecret(v)
        renderDashboard()
      }
    }

    async function renderDashboard() {
      root.innerHTML = topbar('manage') + `
        <div class="admin-container">
          <div class="tabs-row">
            <button class="tab-btn ${currentTab==='requests'?'active':''}" onclick="switchTab('requests')">Pedidos pendentes</button>
            <button class="tab-btn ${currentTab==='contact'?'active':''}" onclick="switchTab('contact')">Fale Conosco</button>
            <button class="tab-btn ${currentTab==='enterprise'?'active':''}" onclick="switchTab('enterprise')">Leads Enterprise</button>
            <button class="tab-btn ${currentTab==='reports'?'active':''}" onclick="switchTab('reports')">Moderação</button>
            <button class="tab-btn ${currentTab==='businesses'?'active':''}" onclick="switchTab('businesses')">Negócios pendentes</button>
            <button class="tab-btn ${currentTab==='restaurant-orders'?'active':''}" onclick="switchTab('restaurant-orders')">Pedidos Restaurante</button>
            <button class="tab-btn ${currentTab==='bolao'?'active':''}" onclick="switchTab('bolao')">Bolão Copa</button>
          </div>
          <div id="tab-content"><p class="muted">Carregando…</p></div>
        </div>
      `
      loadTab(currentTab)
    }

    async function loadTab(tab) {
      const c = document.getElementById('tab-content')
      c.innerHTML = '<p class="muted" style="padding:20px;">Carregando…</p>'
      try {
        if (tab === 'requests')   await loadRequests(c)
        else if (tab === 'contact')    await loadContact(c)
        else if (tab === 'enterprise') await loadEnterprise(c)
        else if (tab === 'reports')    await loadReports(c)
        else if (tab === 'businesses') await loadBusinesses(c)
        else if (tab === 'restaurant-orders') await loadRestaurantOrders(c)
        else if (tab === 'bolao')      await loadBolao(c)
      } catch (e) {
        c.innerHTML = '<div class="err-banner">' + escapeHtml(e.message) + '</div>'
      }
    }

    function switchTab(tab) {
      currentTab = tab
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
      event.target.classList.add('active')
      loadTab(tab)
    }

    async function loadRequests(c) {
      const r = await fetch('/api/social?action=pending-requests&admin_secret=' + encodeURIComponent(getSecret()))
      const data = await r.json()
      if (!r.ok) throw new Error(data.error || 'Erro')
      const reqs = data.requests || []
      if (reqs.length === 0) { c.innerHTML = '<div class="panel"><div class="empty">Nenhum pedido pendente. ✓</div></div>'; return }

      c.innerHTML = '<div class="panel"><div class="panel-eyebrow">PEDIDOS PRA APROVAR</div><h3>' + reqs.length + ' pedido' + (reqs.length === 1 ? '' : 's') + ' aguardando</h3><p class="panel-sub">Comunidades com pré-requisitos exigem aprovação manual.</p>' +
        reqs.map(req => `
          <div class="item" id="req-${req.id}">
            <div class="head">
              <div>
                <div class="name">${escapeHtml(req.bc_communities?.name || 'Comunidade')}</div>
                <div class="meta">User ID: ${escapeHtml((req.user_id || '').slice(0, 8))}... · ${new Date(req.created_at).toLocaleString('pt-BR')}</div>
              </div>
            </div>
            ${req.answer ? '<div class="answer">' + escapeHtml(req.answer) + '</div>' : '<div class="meta">Sem resposta enviada</div>'}
            <div class="actions">
              <button class="btn-mini btn-approve" onclick="approve('${req.id}')">✓ Aprovar</button>
              <button class="btn-mini btn-reject" onclick="reject('${req.id}')">✗ Rejeitar</button>
            </div>
          </div>
        `).join('') + '</div>'
    }

    window.approve = async function(id) {
      if (!confirm('Aprovar este pedido?')) return
      const r = await fetch('/api/social?action=approve-request', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ request_id: id, admin_secret: getSecret() })
      })
      if (r.ok) { document.getElementById('req-' + id).remove() }
      else alert('Erro: ' + ((await r.json()).error || ''))
    }

    window.reject = async function(id) {
      const reason = prompt('Razão da rejeição (opcional):')
      const r = await fetch('/api/social?action=reject-request', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ request_id: id, admin_secret: getSecret(), notes: reason || '' })
      })
      if (r.ok) document.getElementById('req-' + id).remove()
      else alert('Erro')
    }

    async function loadContact(c) {
      let r
      try {
        r = await fetch('/api/admin/contact-messages', { headers: { 'x-admin-secret': getSecret() } })
      } catch (e) {
        c.innerHTML = '<div class="panel"><div class="empty">⚠️ Erro de rede: ' + escapeHtml(e.message) + '</div></div>'
        return
      }

      // Erros HTTP — mensagem clara em vez de cair no fallback de "nenhuma mensagem"
      if (!r.ok) {
        let errMsg = 'Erro carregando mensagens (HTTP ' + r.status + ')'
        if (r.status === 401) {
          errMsg = '🔒 Acesso negado. Confira o admin secret.'
        } else if (r.status === 404) {
          errMsg = 'Endpoint não encontrado. Confirma se /api/admin/contact-messages está deployado no Vercel.'
        } else {
          const d = await r.json().catch(() => ({}))
          if (d.error) errMsg = 'Erro do servidor: ' + escapeHtml(d.error)
        }
        c.innerHTML = '<div class="panel"><div class="empty">' + errMsg + '</div></div>'
        return
      }

      const data = await r.json().catch(() => ({}))
      const msgs = data.messages || []
      if (msgs.length === 0) {
        c.innerHTML = '<div class="panel"><div class="empty">📭 Nenhuma mensagem ainda.<br><br>Quando alguém preencher o form "Manda sua mensagem" no <a href="/" style="color:var(--brand-green);">site</a>, aparece aqui.</div></div>'
        return
      }

      // Templates pre-definidos pra acelerar resposta
      const TEMPLATES = {
        generic:    { label: 'Confirmação genérica',  body: 'Obrigado pelo contato! Recebemos sua mensagem e vamos analisar com calma. Te dou retorno em até 48h úteis.' },
        partnership:{ label: 'Parceria interessada',   body: 'Que ótimo seu interesse em parceria! Vamos sim conversar mais sobre. Você consegue me passar mais detalhes sobre o que tem em mente — modelo de negócio, audiência, e como imagina que faria sentido juntar forças? Posso marcar uma call essa semana se preferir.' },
        business:   { label: 'Listar negócio',         body: 'Adoramos a iniciativa! Pra começar o cadastro do seu negócio, abre essa página: https://brasilconnectusa.com/negocio — preenche o form com os dados (leva 2 min). Nossa equipe analisa e libera em até 48h. Qualquer dúvida me chama por aqui.' },
        investor:   { label: 'Investidor',             body: 'Obrigado pelo interesse em investir no BrasilConnect! Vamos sim conversar com mais profundidade. Pode me mandar uma breve apresentação sua (background, tese de investimento, ticket médio) que monto material apropriado e marco uma call?' },
        bug:        { label: 'Bug reportado',          body: 'Obrigado por reportar! Vou investigar agora e te aviso assim que resolver. Se possível, manda mais detalhes: navegador (Chrome/Safari/Firefox), dispositivo (desktop/celular), e os passos exatos pra reproduzir.' },
        blank:      { label: 'Em branco',              body: '' },
      }

      const fmtDate = (iso) => new Date(iso).toLocaleString('pt-BR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })

      c.innerHTML = '<div class="panel"><div class="panel-eyebrow">FALE CONOSCO</div><h3>' + msgs.length + ' mensagens</h3>' +
        msgs.map(m => {
          const replied = m.status === 'replied'
          const statusBadge = replied
            ? `<span style="background:#DCFCE7;color:#166534;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.05em;">✓ Respondido ${m.replied_at ? '· ' + fmtDate(m.replied_at) : ''}</span>`
            : `<span style="background:#FEF3C7;color:#92400E;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.05em;">Novo</span>`

          return `
          <div class="item" id="msg-${m.id}">
            <div class="head">
              <div style="flex:1;">
                <div class="name">${escapeHtml(m.name)} <span style="font-weight:400;color:var(--ink-muted)">· ${escapeHtml(m.reason)}</span> ${statusBadge}</div>
                <div class="meta">${escapeHtml(m.email)} · ${fmtDate(m.created_at)}</div>
              </div>
            </div>
            <div class="answer">${escapeHtml(m.message)}</div>

            ${replied && m.reply_notes ? `
              <div style="margin-top:10px;padding:10px 12px;background:#F0FDF4;border-left:3px solid #009C3B;border-radius:6px;font-size:13px;color:#14532D;line-height:1.55;">
                <div style="font-size:10px;font-weight:700;color:#166534;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;">Sua resposta</div>
                ${escapeHtml(m.reply_notes).replace(/\n/g,'<br/>')}
              </div>
            ` : ''}

            <div class="actions" style="margin-top:10px;">
              <button class="btn-mini btn-mark" onclick="toggleReply('${m.id}')">${replied ? '↻ Responder de novo' : '✉️ Responder'}</button>
              <a href="mailto:${escapeHtml(m.email)}?subject=Re: BrasilConnect" class="btn-mini" style="text-decoration:none;display:inline-block;background:transparent;border:1px solid var(--line);color:var(--ink-soft);">Cliente de email</a>
            </div>

            <!-- Form de resposta (escondido até clicar) -->
            <div id="reply-${m.id}" style="display:none;margin-top:12px;padding:14px;background:#FAFAFA;border:1px solid var(--line);border-radius:8px;">
              <label style="display:block;font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Template (opcional)</label>
              <select id="tpl-${m.id}" onchange="applyTemplate('${m.id}', this.value)"
                style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--line);background:#fff;font-size:13px;margin-bottom:10px;">
                <option value="">Escolher template…</option>
                ${Object.entries(TEMPLATES).map(([k,t]) => `<option value="${k}">${escapeHtml(t.label)}</option>`).join('')}
              </select>

              <label style="display:block;font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Mensagem</label>
              <textarea id="txt-${m.id}" rows="6" maxlength="10000"
                placeholder="Olá! Obrigado pelo contato..."
                style="width:100%;padding:10px 12px;border-radius:6px;border:1.5px solid var(--line);background:#fff;font-size:14px;font-family:inherit;resize:vertical;box-sizing:border-box;line-height:1.55;"></textarea>
              <div id="cnt-${m.id}" style="text-align:right;font-size:11px;color:#9ca3af;margin-top:4px;">0 / 10.000</div>

              <div style="display:flex;gap:8px;margin-top:10px;align-items:center;">
                <button class="btn-mini btn-approve" onclick="sendReply('${m.id}', '${escapeHtml(m.email)}')" id="snd-${m.id}">Enviar resposta →</button>
                <button class="btn-mini" onclick="toggleReply('${m.id}')" style="background:transparent;border:1px solid var(--line);color:var(--ink-soft);">Cancelar</button>
                <span id="sta-${m.id}" style="font-size:12px;color:var(--ink-muted);margin-left:auto;"></span>
              </div>
            </div>
          </div>
        `}).join('') + '</div>'

      // Wire counter de chars em cada textarea
      msgs.forEach(m => {
        const txt = document.getElementById('txt-' + m.id)
        const cnt = document.getElementById('cnt-' + m.id)
        if (txt && cnt) {
          txt.addEventListener('input', () => {
            const len = txt.value.length
            const ratio = len / 10000
            const color = ratio >= 1 ? '#ef4444' : ratio >= 0.9 ? '#f59e0b' : '#9ca3af'
            cnt.style.color = color
            cnt.textContent = len.toLocaleString('pt-BR') + ' / 10.000'
          })
        }
      })

      // Expoe os templates globalmente pra applyTemplate
      window.__BC_TEMPLATES__ = TEMPLATES
    }

    function toggleReply(id) {
      const box = document.getElementById('reply-' + id)
      if (!box) return
      const isOpen = box.style.display !== 'none'
      box.style.display = isOpen ? 'none' : 'block'
      if (!isOpen) {
        setTimeout(() => document.getElementById('txt-' + id)?.focus(), 50)
      }
    }

    function applyTemplate(id, key) {
      if (!key) return
      const tpl = window.__BC_TEMPLATES__?.[key]
      if (!tpl) return
      const txt = document.getElementById('txt-' + id)
      if (!txt) return
      txt.value = tpl.body
      txt.dispatchEvent(new Event('input'))
      txt.focus()
    }

    async function sendReply(id, email) {
      const txt = document.getElementById('txt-' + id)
      const btn = document.getElementById('snd-' + id)
      const sta = document.getElementById('sta-' + id)
      if (!txt || !btn || !sta) return

      const reply_text = txt.value.trim()
      if (reply_text.length < 5) {
        sta.style.color = '#ef4444'
        sta.textContent = 'Mensagem muito curta'
        return
      }

      btn.disabled = true
      btn.textContent = 'Enviando…'
      sta.style.color = 'var(--ink-muted)'
      sta.textContent = ''

      try {
        const r = await fetch('/api/admin/contact-reply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
          body: JSON.stringify({ message_id: id, reply_text }),
        })
        const data = await r.json().catch(() => ({}))
        if (!r.ok) throw new Error(data.error || 'Falha no envio')

        sta.style.color = '#166534'
        sta.textContent = '✓ Enviado pra ' + email
        btn.textContent = 'Enviado ✓'
        // Recarrega a lista pra mostrar status atualizado
        setTimeout(() => loadContact(document.getElementById('tab-content')), 1500)
      } catch (e) {
        sta.style.color = '#ef4444'
        sta.textContent = '⚠️ ' + e.message
        btn.disabled = false
        btn.textContent = 'Enviar resposta →'
      }
    }

    async function loadReports(c) {
      try {
        const r = await fetch('/api/admin/reports?status=pending', { headers: { 'x-admin-secret': getSecret() } })
        const d = await r.json()
        if (!r.ok) throw new Error(d.error || 'Erro')
        const list = d.reports || []
        if (list.length === 0) {
          c.innerHTML = '<div class="panel"><div class="empty">✅ Nenhuma denúncia pendente.</div></div>'
          return
        }
        c.innerHTML = '<div class="panel"><div class="panel-eyebrow">MODERACAO</div><h3>' + list.length + ' denúncias pendentes</h3>' +
          '<p class="panel-sub">Cada denúncia mostra o que foi reportado e por que. Você decide: dispensar, marcar revisado, ou apagar o conteúdo.</p>' +
          list.map(r => `
            <div class="item">
              <div class="head">
                <div>
                  <div class="name">${escapeHtml(r.target_type)} #${escapeHtml((r.target_id || '').slice(0, 8))}</div>
                  <div class="meta">Motivo: ${escapeHtml(r.reason)} · ${new Date(r.created_at).toLocaleString('pt-BR')}</div>
                </div>
                <span class="badge badge-pending">${escapeHtml(r.status)}</span>
              </div>
              ${r.details ? '<div class="answer">' + escapeHtml(r.details) + '</div>' : ''}
              <div class="actions" style="margin-top:10px;">
                <button class="btn-mini btn-approve" onclick="resolveReport('${r.id}', 'dismissed', null, false)">Dispensar</button>
                <button class="btn-mini btn-mark" onclick="resolveReport('${r.id}', 'reviewed', 'warned', false)">Marcar revisado</button>
                <button class="btn-mini btn-reject" onclick="resolveReport('${r.id}', 'actioned', 'removed_post', true)">Apagar conteúdo</button>
              </div>
            </div>
          `).join('') + '</div>'
      } catch (e) {
        c.innerHTML = '<div class="err-banner">' + escapeHtml(e.message) + '</div>'
      }
    }

    async function resolveReport(id, status, action, deleteTarget) {

    // ─── Mensagem livre pro dono do negócio (com template + Resend) ──────
    function toggleBizMsg(id) {
      const box = document.getElementById('bizmsg-' + id)
      if (!box) return
      const isOpen = box.style.display !== 'none'
      box.style.display = isOpen ? 'none' : 'block'
      if (!isOpen) setTimeout(() => document.getElementById('bmtxt-' + id)?.focus(), 50)
    }

    function applyBizTemplate(id, key) {
      if (!key) return
      const body = window.__BIZ_TEMPLATES__?.[key] ?? ''
      const txt = document.getElementById('bmtxt-' + id)
      if (!txt) return
      txt.value = body
      txt.dispatchEvent(new Event('input'))
      txt.focus()
    }

    async function sendBizMsg(id, email) {
      const txt = document.getElementById('bmtxt-' + id)
      const btn = document.getElementById('bmsnd-' + id)
      const sta = document.getElementById('bmsta-' + id)
      if (!txt || !btn || !sta) return

      const msg = txt.value.trim()
      if (msg.length < 5) { sta.style.color = '#ef4444'; sta.textContent = 'Mensagem muito curta'; return }

      btn.disabled = true; btn.textContent = 'Enviando…'
      sta.style.color = 'var(--ink-muted)'; sta.textContent = ''

      try {
        const r = await fetch('/api/admin/business-message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
          body: JSON.stringify({ business_id: id, message: msg }),
        })
        const d = await r.json().catch(() => ({}))
        if (!r.ok) throw new Error(d.error || 'Falha')

        sta.style.color = '#166534'; sta.textContent = '✓ Enviado pra ' + (d.sent_to || email)
        btn.textContent = 'Enviado ✓'
      } catch (e) {
        sta.style.color = '#ef4444'; sta.textContent = '⚠️ ' + e.message
        btn.disabled = false; btn.textContent = 'Enviar mensagem →'
      }
    }

    // Aprovar / rejeitar negócio (com email automático via Resend)
    async function bizAction(id, action) {
      const label = action === 'approve' ? 'aprovar' : 'rejeitar'

      // Pra rejeitar, pede motivo (opcional mas recomendado — vai no email)
      let reason = null
      if (action === 'reject') {
        reason = prompt('Motivo da rejeição (opcional — vai no email pro dono):\n\nEx: "Não conseguimos confirmar o endereço, ou o telefone não atende."', '')
        if (reason === null) return // cancelou
      } else {
        if (!confirm('Aprovar esse negócio? Vamos mandar email automático pro dono confirmando.')) return
      }

      const msg = document.getElementById('msg-biz-' + id)
      const aBtn = document.getElementById('appr-' + id)
      const rBtn = document.getElementById('rej-' + id)
      aBtn.disabled = true; rBtn.disabled = true
      msg.style.color = 'var(--ink-muted)'
      msg.textContent = (action === 'approve' ? 'Aprovando' : 'Rejeitando') + ' + mandando email…'

      try {
        const r = await fetch('/api/admin/business-action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
          body: JSON.stringify({ business_id: id, action, reason: reason || undefined }),
        })
        const d = await r.json().catch(() => ({}))
        if (!r.ok) throw new Error(d.error || 'Erro')

        msg.style.color = action === 'approve' ? '#166534' : '#DC2626'
        const emailNote = d.email_sent ? ' · email enviado pra ' + (d.email_to || 'dono') : ' · email NÃO enviado'
        msg.textContent = (action === 'approve' ? '✓ Aprovado' : '✗ Rejeitado') + emailNote
        // Some o item da lista em 1.8s
        setTimeout(() => {
          const el = document.getElementById('biz-' + id)
          if (el) { el.style.transition = 'opacity 0.3s'; el.style.opacity = '0'; setTimeout(() => loadTab('businesses'), 350) }
        }, 1800)
      } catch (e) {
        msg.style.color = '#DC2626'
        msg.textContent = '⚠️ ' + e.message
        aBtn.disabled = false; rBtn.disabled = false
      }
    }

            <option value="365" ${days==='365'?'selected':''}>1 ano</option>
          </select>
          <label style="font-size:12px;color:var(--ink-muted);margin-left:8px;">Status:</label>
          <select onchange="setRestaurantFilter('status', this.value)" style="padding:6px 10px;border-radius:6px;border:1px solid var(--line);font-size:13px;background:#fff;">
            <option value=""           ${statusFilter===''         ?'selected':''}>Todos</option>
            <option value="pending"    ${statusFilter==='pending'  ?'selected':''}>Pendentes</option>
            <option value="confirmed"  ${statusFilter==='confirmed'?'selected':''}>Confirmados</option>
            <option value="preparing"  ${statusFilter==='preparing'?'selected':''}>Preparando</option>
            <option value="ready"      ${statusFilter==='ready'    ?'selected':''}>Prontos</option>
            <option value="delivered"  ${statusFilter==='delivered'?'selected':''}>Entregues</option>
            <option value="canceled"   ${statusFilter==='canceled' ?'selected':''}>Cancelados</option>
          </select>
          <span style="margin-left:auto;font-size:12px;color:var(--ink-muted);">${orders.length} pedidos</span>
        </div>

        <!-- Lista -->
        <div class="panel" style="padding:0;">
          ${orders.length === 0 ? `
            <div class="empty" style="padding:40px;text-align:center;">
              📭 Nenhum pedido nesse período.<br><br>
              Quando algum negócio com Stripe Connect ativo receber pedido via <code>/negocio/&lt;slug&gt;/cardapio</code>, aparece aqui.
            </div>
          ` : `
            <table style="width:100%;border-collapse:collapse;font-size:13px;">
              <thead>
                <tr style="background:var(--paper-soft);border-bottom:1px solid var(--line);">
                  <th style="text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">#</th>
                  <th style="text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">Restaurante</th>
                  <th style="text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">Cliente</th>
                  <th style="text-align:right;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">Total</th>
                  <th style="text-align:right;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">Nossa</th>
                  <th style="text-align:center;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">Status</th>
                  <th style="text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);font-weight:700;">Quando</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${orders.map(o => `
                  <tr style="border-bottom:1px solid var(--line);">
                    <td style="padding:10px 14px;font-weight:700;color:var(--ink);">#${o.order_number}</td>
                    <td style="padding:10px 14px;">
                      <div style="font-weight:600;">${escapeHtml(o.bc_businesses?.name || '—')}</div>
                      <div style="font-size:11px;color:var(--ink-muted);">${escapeHtml(o.bc_businesses?.city || '')}, ${escapeHtml(o.bc_businesses?.state || '')}</div>
                    </td>
                    <td style="padding:10px 14px;">
                      <div>${escapeHtml(o.customer_name || '—')}</div>
                      <div style="font-size:11px;color:var(--ink-muted);">${escapeHtml(o.customer_email)}</div>
                    </td>
                    <td style="padding:10px 14px;text-align:right;font-weight:600;">${fmtMoney(o.total_cents)}</td>
                    <td style="padding:10px 14px;text-align:right;color:#854D0E;font-weight:600;">${fmtMoney(o.platform_fee_cents)}</td>
                    <td style="padding:10px 14px;text-align:center;">
                      ${statusBadge(o.status)}<br>
                      <div style="margin-top:3px;">${payBadge(o.payment_status)}</div>
                    </td>
                    <td style="padding:10px 14px;font-size:12px;color:var(--ink-muted);">${fmtDate(o.created_at)}</td>
                    <td style="padding:10px 14px;">
                      <a href="/pedido/${o.id}" target="_blank" class="btn-mini" style="text-decoration:none;font-size:11px;padding:4px 8px;">Ver →</a>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `}
        </div>
      `
    }

    function setRestaurantFilter(key, value) {
      const c = document.getElementById('tab-content')
      if (value) c.dataset[key] = value
      else delete c.dataset[key]
      loadRestaurantOrders(c)
    }

    if (getSecret()) renderDashboard()
    else renderLogin()
  </script>
</body>
</html>
