<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin · Mind Map · BrasilConnect USA</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/premium.css">
  <style>
    body { background: var(--paper); }

    /* ── Topbar ─────────────────────────────────────────────── */
    .admin-topbar { background: var(--paper-elevated); border-bottom: 1px solid var(--line); padding: 18px 24px; }
    .admin-topbar .brand { display: flex; align-items: center; gap: 14px; max-width: 1400px; margin: 0 auto; flex-wrap: wrap; }
    .admin-topbar .brand img { height: 36px; }
    .admin-topbar .nav-links { display: flex; gap: 14px; margin-left: 8px; flex-wrap: wrap; }
    .admin-topbar .nav-links a { font-size: 13px; color: var(--ink-soft); text-decoration: none; }
    .admin-topbar .nav-links a.active { color: var(--brand-green); font-weight: 600; }
    .admin-topbar .meta { margin-left: auto; font-size: 13px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; }

    .admin-container { max-width: 1400px; margin: 24px auto; padding: 0 24px; }

    /* ── Login ──────────────────────────────────────────────── */
    .login-card { max-width: 380px; margin: 80px auto; background: var(--paper-elevated); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 36px 28px; text-align: center; }
    .login-card .eyebrow { text-transform: uppercase; letter-spacing: 0.18em; font-size: 11px; font-weight: 600; color: var(--brand-gold-dark); margin-bottom: 12px; }
    .login-card h2 { font-family: var(--font-display); font-size: 1.6rem; font-weight: 600; margin: 0 0 8px 0; }
    .login-card input { width: 100%; padding: 12px 14px; font-size: 14px; border: 1px solid var(--line); border-radius: var(--r-md); margin-bottom: 12px; box-sizing: border-box; font-family: inherit; outline: none; background: var(--paper); }
    .err-banner { background: #FBE9E7; color: #802020; border: 1px solid #E8C2BC; padding: 10px 14px; border-radius: var(--r-sm); font-size: 13px; margin-bottom: 14px; text-align: left; }

    /* ── Header / Hero ──────────────────────────────────────── */
    .hero-strip {
      background: linear-gradient(135deg, var(--brand-green) 0%, var(--brand-green-dark) 100%);
      color: #FAF7F0; padding: 28px 32px; border-radius: var(--r-lg); margin-bottom: 22px;
    }
    .hero-strip .eyebrow { text-transform: uppercase; letter-spacing: 0.18em; font-size: 10px; font-weight: 600; opacity: 0.75; margin-bottom: 8px; }
    .hero-strip h1 { font-family: var(--font-display); font-size: 1.8rem; margin: 0 0 6px 0; color: #FAF7F0; font-weight: 600; }
    .hero-strip p { color: #FAF7F0; opacity: 0.85; font-size: 14px; margin: 0; max-width: 720px; }

    /* ── Resumo / Stats ─────────────────────────────────────── */
    .summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 22px; }
    .stat-block { background: var(--paper-elevated); border: 1px solid var(--line); border-radius: var(--r-md); padding: 18px 20px; }
    .stat-block .label { text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px; color: var(--ink-muted); margin-bottom: 6px; font-weight: 600; }
    .stat-block .value { font-family: var(--font-display); font-size: 1.7rem; font-weight: 600; color: var(--ink); line-height: 1; }
    .stat-block .sub { font-size: 11px; color: var(--ink-muted); margin-top: 5px; }
    .stat-block.ok .value { color: var(--brand-green); }
    .stat-block.warn .value { color: #B45309; }
    .stat-block.miss .value { color: #C2410C; }

    /* ── Filter chips ───────────────────────────────────────── */
    .filter-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .chip {
      padding: 7px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--line); background: var(--paper-elevated);
      color: var(--ink-soft); transition: all .15s; user-select: none;
    }
    .chip:hover { border-color: var(--brand-gold); }
    .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .chip .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .dot.ok   { background: #16A34A; }
    .dot.warn { background: #D97706; }
    .dot.miss { background: #DC2626; }
    .dot.note { background: #6B7280; }

    /* ── Mind Map SVG ───────────────────────────────────────── */
    .panel { background: var(--paper-elevated); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 24px 28px; margin-bottom: 18px; }
    .panel h3 { font-family: var(--font-display); margin: 0 0 6px 0; color: var(--ink); font-size: 1.2rem; font-weight: 600; }
    .panel .panel-eyebrow { text-transform: uppercase; letter-spacing: 0.18em; font-size: 10px; font-weight: 600; color: var(--brand-gold-dark); margin-bottom: 6px; }
    .panel .panel-sub { color: var(--ink-muted); font-size: 13px; margin: 0 0 16px 0; }

    .mindmap-wrap { width: 100%; overflow-x: auto; padding: 8px 0; }
    .mindmap-wrap svg { display: block; min-width: 980px; }
    .mm-node-rect { rx: 12; ry: 12; stroke-width: 1.5; }
    .mm-link { fill: none; stroke-width: 1.5; }
    .mm-text { font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 600; fill: var(--ink); }
    .mm-text.sub { font-size: 10px; font-weight: 500; fill: var(--ink-muted); }
    .mm-root { fill: var(--brand-green); stroke: var(--brand-green-dark); }
    .mm-root-text { fill: #FAF7F0; font-size: 14px; font-weight: 700; }
    .mm-ok       { fill: #DCFCE7; stroke: #16A34A; }
    .mm-warn     { fill: #FEF3C7; stroke: #D97706; }
    .mm-miss     { fill: #FEE2E2; stroke: #DC2626; }
    .mm-note     { fill: #F3F4F6; stroke: #6B7280; }
    .mm-node { cursor: pointer; transition: transform .15s; }
    .mm-node:hover { filter: brightness(1.05); }

    /* ── Cards detalhados ──────────────────────────────────── */
    .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 14px; }
    .feature-card {
      background: var(--paper-elevated); border: 1px solid var(--line);
      border-radius: var(--r-md); padding: 18px 20px; position: relative;
      transition: border-color .15s, box-shadow .15s;
    }
    .feature-card:hover { border-color: var(--brand-gold); box-shadow: var(--shadow-sm); }
    .feature-card.hidden { display: none; }
    .feature-card .head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .feature-card .icon { font-size: 22px; line-height: 1; flex-shrink: 0; }
    .feature-card h4 { margin: 0 0 2px 0; font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; color: var(--ink); }
    .feature-card .sub-label { font-size: 11px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .feature-card .badge {
      margin-left: auto; padding: 4px 10px; border-radius: 999px;
      font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .badge.ok   { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; }
    .badge.warn { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
    .badge.miss { background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; }
    .badge.note { background: #F3F4F6; color: #374151; border: 1px solid #D1D5DB; }

    .feature-card .check-list { margin: 8px 0 0 0; padding: 0; list-style: none; font-size: 13px; }
    .feature-card .check-list li { padding: 4px 0; color: var(--ink-soft); display: flex; gap: 8px; align-items: flex-start; line-height: 1.45; }
    .feature-card .check-list li::before { flex-shrink: 0; }
    .feature-card .check-list li.done::before    { content: '✅'; }
    .feature-card .check-list li.partial::before { content: '🟡'; }
    .feature-card .check-list li.missing::before { content: '⬜'; }
    .feature-card .check-list li.note::before    { content: '·'; font-weight: 700; padding: 0 6px; }

    .feature-card .footer-meta {
      margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line-soft);
      font-size: 11px; color: var(--ink-muted); display: flex; gap: 12px; flex-wrap: wrap;
    }
    .feature-card .footer-meta span { display: inline-flex; align-items: center; gap: 4px; }

    /* ── Roadmap ─────────────────────────────────────────────── */
    .roadmap { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-top: 8px; }
    .road-col { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); padding: 14px 16px; }
    .road-col h5 { margin: 0 0 10px 0; font-family: var(--font-display); font-size: 14px; color: var(--ink); }
    .road-col ul { margin: 0; padding-left: 18px; font-size: 13px; color: var(--ink-soft); }
    .road-col ul li { padding: 3px 0; line-height: 1.4; }
    .road-col.now   { border-top: 3px solid #DC2626; }
    .road-col.next  { border-top: 3px solid #D97706; }
    .road-col.later { border-top: 3px solid var(--brand-green); }

    /* ── Security ──────────────────────────────────────────── */
    .sec-list li { padding: 8px 0; border-bottom: 1px solid var(--line-soft); display: flex; gap: 10px; align-items: flex-start; }
    .sec-list li:last-child { border-bottom: none; }
    .sec-list .sev { flex-shrink: 0; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .sev.high { background: #FEE2E2; color: #991B1B; }
    .sev.med  { background: #FEF3C7; color: #92400E; }
    .sev.low  { background: #DCFCE7; color: #166534; }
    .sec-list .text { font-size: 13px; color: var(--ink-soft); line-height: 1.5; }
    .sec-list .text strong { color: var(--ink); }

    /* ── Print / mobile ─────────────────────────────────────── */
    @media (max-width: 720px) {
      .admin-topbar .meta { display: none; }
      .panel { padding: 18px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const STORAGE_KEY = 'bc_admin_secret';
    const root = document.getElementById('app');
    const getSecret = () => { try { return sessionStorage.getItem(STORAGE_KEY) || ''; } catch (e) { return ''; } };
    const setSecret = s => { try { sessionStorage.setItem(STORAGE_KEY, s); } catch (e) {} };
    const clearSecret = () => { try { sessionStorage.removeItem(STORAGE_KEY); } catch (e) {} };
    const escapeHtml = s => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));

    function topbar(active) {
      return `
        <div class="admin-topbar">
          <div class="brand">
            <a href="/admin" style="text-decoration:none;font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:600;color:var(--brand-navy);letter-spacing:-0.01em;"><span>Brasil</span><em style="color:var(--brand-gold);font-style:normal;font-weight:600;">Connect</em></a>
            <div class="nav-links">
              <a href="/admin/mindmap" class="${active==='mindmap'?'active':''}">Mind Map</a>
              <a href="/admin/manage">Gerenciar</a>
              <a href="/admin/waitlist" class="${active==='waitlist'?'active':''}">Lista de espera</a>
              <a href="/admin/analytics" class="${active==='analytics'?'active':''}">Analytics</a>
              <a href="/admin/utm-builder" class="${active==='utm'?'active':''}">UTM Builder</a>
            </div>
            <div class="meta">Admin Console</div>
          </div>
        </div>
      `;
    }

    function renderLogin(errMsg) {
      root.innerHTML = topbar() + `
        <div class="login-card">
          <div class="eyebrow">ACESSO RESTRITO</div>
          <h2>Mind Map da Plataforma</h2>
          <p class="muted">Use o segredo administrativo (variável <code>ADMIN_SECRET</code>) para entrar.</p>
          ${errMsg ? `<div class="err-banner">${escapeHtml(errMsg)}</div>` : ''}
          <input id="secret" type="password" placeholder="ADMIN_SECRET" autocomplete="off" />
          <button class="btn btn-primary" id="loginBtn" style="width:100%;">Entrar</button>
        </div>
      `;
      document.getElementById('loginBtn').onclick = doLogin;
      document.getElementById('secret').onkeydown = e => { if (e.key === 'Enter') doLogin(); };
      setTimeout(() => document.getElementById('secret').focus(), 80);
    }

    async function doLogin() {
      const v = document.getElementById('secret').value.trim();
      if (!v) return;
      // Validamos o secret contra a API analytics (mesmo backend) só pra validar.
      try {
        const r = await fetch('/api/admin/analytics', { headers: { 'x-admin-secret': v } });
        if (r.status === 401) return renderLogin('Senha incorreta');
        // 200 ou outro erro: aceitamos e seguimos (mind map é estático).
        setSecret(v);
        renderPage();
      } catch (e) {
        // Sem rede / sem API: aceita localmente porque mindmap é client-side.
        setSecret(v);
        renderPage();
      }
    }

    const STATUS_LABELS = {

      warn: { label: 'Parcial',     dot: 'warn' },
      miss: { label: 'Faltando',    dot: 'miss' },
      note: { label: 'Nota',        dot: 'note' },

    // ════════════════════════════════════════════════════════════════
    //   MIND MAP SVG (gerado dinamicamente)
    // ════════════════════════════════════════════════════════════════
    function buildMindMap() {
      // Layout em 2 colunas (esquerda / direita do nó central) — radial-ish
      const leftCol  = ['cambio', 'voos', 'guias', 'email-drip', 'pwa', 'referral'];
      const rightCol = ['bolao', 'agenda', 'profile', 'negocios', 'grupos-interesse', 'grupo-maes'];

      const W = 1280, H = 720;
      const cx = W / 2, cy = H / 2;
      const rootW = 200, rootH = 70;

      const nodeW = 240, nodeH = 60;
      const stepY = 110;
      const leftX  = 30;
      const rightX = W - nodeW - 30;
      const topL = cy - ((leftCol.length - 1) * stepY) / 2;
      const topR = cy - ((rightCol.length - 1) * stepY) / 2;

      const findFeat = id => FEATURES.find(f => f.id === id);
      const statusClass = s => 'mm-' + s;

      const nodesSvg = [];
      const linksSvg = [];

      // Helpers de path curvo
      const curveLeft  = (x1, y1, x2, y2) => `M ${x1} ${y1} C ${(x1 + x2) / 2} ${y1}, ${(x1 + x2) / 2} ${y2}, ${x2} ${y2}`;
      const curveRight = curveLeft; // simétrico

      leftCol.forEach((id, i) => {
        const f = findFeat(id); if (!f) return;
        const y = topL + i * stepY;
        const nodeRight = leftX + nodeW;
        // Link
        linksSvg.push(`<path class="mm-link" d="${curveLeft(nodeRight, y + nodeH / 2, cx - rootW / 2, cy)}" stroke="${strokeFor(f.status)}" />`);
        // Node
        nodesSvg.push(renderNode(leftX, y, nodeW, nodeH, f));
      });

      rightCol.forEach((id, i) => {
        const f = findFeat(id); if (!f) return;
        const y = topR + i * stepY;
        const nodeLeft = rightX;
        linksSvg.push(`<path class="mm-link" d="${curveRight(cx + rootW / 2, cy, nodeLeft, y + nodeH / 2)}" stroke="${strokeFor(f.status)}" />`);
        nodesSvg.push(renderNode(rightX, y, nodeW, nodeH, f));
      });

      // Root node
      const rootSvg = `
        <g>
          <rect class="mm-node-rect mm-root" x="${cx - rootW / 2}" y="${cy - rootH / 2}" width="${rootW}" height="${rootH}" />
          <text class="mm-text mm-root-text" x="${cx}" y="${cy - 4}" text-anchor="middle">Brasil Connect</text>
          <text class="mm-text mm-root-text" x="${cx}" y="${cy + 16}" text-anchor="middle" style="font-size:11px;font-weight:500;opacity:0.85">Plataforma · Comunidade BR-USA</text>
        </g>
      `;

      return `
        <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          ${linksSvg.join('\n')}
          ${rootSvg}
          ${nodesSvg.join('\n')}
        </svg>
      `;
    }

    function strokeFor(s) {
      return ({ ok: '#86EFAC', warn: '#FCD34D', miss: '#FCA5A5' })[s] || '#D1D5DB';
    }

    function renderNode(x, y, w, h, f) {
      const cls = 'mm-node-rect ' + ('mm-' + f.status);
      const cx = x + w / 2;
      const dot = f.status === 'ok' ? '●' : f.status === 'warn' ? '◐' : '○';
      const dotColor = f.status === 'ok' ? '#16A34A' : f.status === 'warn' ? '#D97706' : '#DC2626';
      return `
        <g class="mm-node" data-id="${f.id}" onclick="scrollToFeature('${f.id}')">
          <rect class="${cls}" x="${x}" y="${y}" width="${w}" height="${h}" />
          <text x="${x + 12}" y="${y + 24}" font-size="18">${f.icon}</text>
          <text class="mm-text" x="${x + 38}" y="${y + 24}">${escapeHtml(f.title)}</text>
          <text class="mm-text sub" x="${x + 38}" y="${y + 42}">${escapeHtml(f.category)}</text>
          <text x="${x + w - 16}" y="${y + 24}" text-anchor="end" font-size="13" font-weight="700" fill="${dotColor}">${dot}</text>
        </g>
      `;
    }

    window.scrollToFeature = function (id) {
      const el = document.getElementById('feat-' + id);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.style.transition = 'background .25s';
        el.style.background = '#FEF3C7';
        setTimeout(() => { el.style.background = ''; }, 1200);
      }
    };

    // ════════════════════════════════════════════════════════════════
    //   RENDER
    // ════════════════════════════════════════════════════════════════
    function summary() {
      const total = FEATURES.length;
      const ok    = FEATURES.filter(f => f.status === 'ok').length;
      const warn  = FEATURES.filter(f => f.status === 'warn').length;
      const miss  = FEATURES.filter(f => f.status === 'miss').length;
      const pct   = Math.round((ok / total) * 100);
      return { total, ok, warn, miss, pct };
    }

      const s = summary();

      root.innerHTML = topbar('mindmap') + `

            <h1>Mind Map da Plataforma</h1>

            <div class="stat-block ok">

            </div>

            </div>
            <div class="stat-block miss">
              <div class="label">Faltando</div>
              <div class="value">${s.miss}</div>
              <div class="sub">não construído</div>
            </div>
            <div class="stat-block">
              <div class="label">Total auditado</div>
              <div class="value">${s.total}</div>
              <div class="sub">áreas da plataforma</div>
            </div>
          </div>

          <!-- Mind map SVG -->
          <div class="panel">
            <div class="panel-eyebrow">VISÃO GERAL</div>
            <h3>Mapa Mental</h3>
            <p class="panel-sub">Cada nó representa uma área da plataforma. Cor verde = funcionando · âmbar = parcial · vermelho = faltando.</p>
            <div class="mindmap-wrap">${buildMindMap()}</div>
          </div>

          <!-- Filter chips -->
          <div class="filter-row" id="filters">
            <div class="chip active" data-filter="all"><span class="dot note"></span>Tudo (${s.total})</div>
            <div class="chip" data-filter="ok"><span class="dot ok"></span>Funcionando (${s.ok})</div>
            <div class="chip" data-filter="warn"><span class="dot warn"></span>Parcial (${s.warn})</div>
            <div class="chip" data-filter="miss"><span class="dot miss"></span>Faltando (${s.miss})</div>
          </div>

          <!-- Feature cards -->
          <div class="panel">
            <div class="panel-eyebrow">DETALHE POR FEATURE</div>
            <h3>Status detalhado</h3>
            <p class="panel-sub">Para cada área: o que está pronto (✅), parcial (🟡), ou faltando (⬜).</p>
            <div class="feature-grid" id="featureGrid">
              ${FEATURES.map(renderFeatureCard).join('')}
            </div>
          </div>

        </div>
      `;

      // Filtros
      document.querySelectorAll('#filters .chip').forEach(c => {
        c.addEventListener('click', () => {
          document.querySelectorAll('#filters .chip').forEach(x => x.classList.remove('active'));
          c.classList.add('active');
          const f = c.dataset.filter;
          document.querySelectorAll('.feature-card').forEach(card => {
            card.classList.toggle('hidden', f !== 'all' && card.dataset.status !== f);
          });
        });
      });
    }

    function renderFeatureCard(f) {
      const lbl = STATUS_LABELS[f.status] || STATUS_LABELS.note;
      return `
        <div class="feature-card" id="feat-${f.id}" data-status="${f.status}">
          <div class="head">
            <span class="icon">${f.icon}</span>
            <div>
              <h4>${escapeHtml(f.title)}</h4>
              <div class="sub-label">${escapeHtml(f.category)}</div>
            </div>
            <span class="badge ${f.status}">${lbl.label}</span>
          </div>
          <ul class="check-list">
            ${f.items.map(it => `<li class="${it.type}">${escapeHtml(it.text)}</li>`).join('')}
          </ul>
        </div>
      `;
    }

    if (getSecret()) renderPage();
    else renderLogin();
  </script>
